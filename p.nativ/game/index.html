<!-- index.html -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחק קלפים לקבוצות</title>
  <meta name="description" content="משחק קלפים סטטי לחלוקה לתת-קבוצות בגודל 2 או 3, ללא גלילה." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="group1">
  <div class="app-shell">
    <header class="page-header">
      <div class="header-copy">
        <p class="eyebrow">Portzot Derech</p>
        <h1>משחק קלפים לקבוצות</h1>
        <p class="subtitle">בחירת מצב קבוצה, חלוקה אוטומטית לתת-קבוצות 2–3, ותצוגת קלפים ללא גלילה.</p>
      </div>

      <div class="theme-badge" id="themeBadge" aria-live="polite">
        מצב פעיל: קבוצה 1
      </div>
    </header>

    <section class="control-panel" aria-label="הגדרות משחק">
      <form id="setupForm" class="setup-form" novalidate>
        <fieldset class="mode-fieldset">
          <legend>בחירת מצב</legend>

          <label class="mode-option">
            <input type="radio" name="groupMode" value="group1" checked />
            <span>קבוצה 1</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="groupMode" value="group2" />
            <span>קבוצה 2</span>
          </label>
        </fieldset>

        <label class="input-field" for="participantCount">
          <span>מספר משתתפות</span>
          <input
            id="participantCount"
            name="participantCount"
            type="number"
            inputmode="numeric"
            min="2"
            step="1"
            placeholder="לדוגמה 12"
            required
          />
        </label>

        <button type="submit" class="primary-button">צור לוח</button>
      </form>

      <div class="panel-feedback">
        <p id="validationMessage" class="feedback-message is-hidden" role="alert" aria-live="assertive"></p>
        <p id="summaryMessage" class="feedback-message neutral" aria-live="polite">
          הזיני מספר משתתפות ובחרי מצב קבוצה כדי לבנות את הלוח.
        </p>
      </div>
    </section>

    <main class="board-area" id="boardArea">
      <div class="board-placeholder" id="boardPlaceholder">
        <div class="placeholder-card">
          <strong>הלוח עדיין לא נבנה</strong>
          <span>בחרי מצב קבוצה, הזיני מספר משתתפות ולחצי על “צור לוח”.</span>
        </div>
      </div>

      <div id="boardGrid" class="board-grid is-hidden" aria-live="polite" aria-label="לוח הקלפים"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
