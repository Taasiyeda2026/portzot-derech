<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>משחק קלפים - מדריכה</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="group1">
    <main class="app">
      <header class="app-header">
        <h1>משחק קלפים לקבוצות</h1>
        <p>בחירת קבוצה, חלוקה אוטומטית לתתי-קבוצות (2/3 בלבד), והצגת כרטיסים ללא גלילה.</p>
      </header>

      <section class="controls" aria-label="בקרות משחק">
        <form id="setup-form" novalidate>
          <fieldset>
            <legend>מצב קבוצה</legend>
            <label>
              <input type="radio" name="groupMode" value="group1" checked />
              קבוצה 1
            </label>
            <label>
              <input type="radio" name="groupMode" value="group2" />
              קבוצה 2
            </label>
          </fieldset>

          <label class="number-field" for="participants">מספר משתתפות</label>
          <input id="participants" name="participants" type="number" min="2" step="1" value="9" inputmode="numeric" />

          <div class="actions-row">
            <button type="submit" class="primary-btn">בני לוח קלפים</button>
          </div>
        </form>

        <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      </section>

      <section id="board-wrapper" class="board-wrapper" aria-label="לוח קלפים">
        <div id="board" class="board"></div>
      </section>
    </main>

    <template id="card-template">
      <article class="card" tabindex="0" role="button" aria-pressed="false">
        <div class="card-inner">
          <div class="card-face card-front"></div>
          <div class="card-face card-back"></div>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
