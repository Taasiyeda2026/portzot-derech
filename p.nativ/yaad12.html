<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>יעד 12 - צריכה וייצור אחראיים</title>
  <style>
    :root {
      --bg: #f3f3f3;
      --title: #eb1e63;
      --subtitle: #6b1635;
      --card: #d7e5ee;
      --card-hover: #cddfe9;
      --card-active: #c3d9e6;
      --text: #111827;
      --muted: #334155;
      --shadow: 0 10px 26px rgba(37, 60, 84, 0.10);
      --modal-shadow: 0 18px 44px rgba(15, 23, 42, 0.22);
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans Hebrew", "Heebo", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(235, 30, 99, 0.08), transparent 24%),
        radial-gradient(circle at top left, rgba(95, 160, 190, 0.12), transparent 28%),
        linear-gradient(180deg, #f7f7f8 0%, #eef3f6 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .zoom-shell {
      width: calc(100% / 0.75);
      transform: scale(0.75);
      transform-origin: top center;
    }

    .page {
      max-width: var(--max-width);
      margin: 24px auto;
      padding: 32px 20px 56px;
      background: linear-gradient(180deg, rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.58) 100%);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 28px;
      box-shadow:
        0 24px 60px rgba(15, 23, 42, 0.08),
        0 8px 24px rgba(37, 60, 84, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.3rem, 4vw, 4.2rem);
      line-height: 1;
      font-weight: 900;
      background: linear-gradient(90deg, #eb1e63, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero h2 {
      margin: 12px 0 0;
      font-size: clamp(2rem, 4vw, 4.8rem);
      line-height: 1.05;
      font-weight: 900;
      color: var(--subtitle);
      position: relative;
    }

    .hero h2::after {
      content: "";
      display: block;
      width: 80px;
      height: 4px;
      margin: 10px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #eb1e63, #a855f7);
      opacity: 0.6;
    }

    .hero p {
      max-width: 760px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .mockup-wrap {
      display: flex;
      justify-content: center;
      margin: 22px 0 26px;
    }

    .mockup-wrap img {
      width: min(100%, 820px);
      height: auto;
      display: block;
      border-radius: 24px;
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.12),
        0 6px 18px rgba(37, 60, 84, 0.08);
      background: #fff;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .helper {
      text-align: center;
      color: #64748b;
      font-size: 0.96rem;
      margin: 0 0 18px;
    }

    .problems-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px 22px;
      align-items: start;
    }

    .problem-item {
      min-width: 0;
    }

    .problem-trigger {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 14px;
      background: linear-gradient(180deg, #dbeaf2 0%, #d2e3ec 100%);
      color: var(--text);
      padding: 14px 12px;
      min-height: 54px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.3;
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow:
        0 6px 16px rgba(37, 60, 84, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.7);
      text-wrap: balance;
      overflow-wrap: break-word;
    }

    .problem-trigger:hover {
      background: var(--card-hover);
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 28px rgba(37, 60, 84, 0.12);
    }

    .problem-trigger.active {
      background: linear-gradient(180deg, #f3d6e3 0%, #eec6da 100%);
      box-shadow:
        0 18px 38px rgba(235, 30, 99, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.6);
      transform: scale(1.02);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, rgba(17, 24, 39, 0.58) 42%, rgba(17, 24, 39, 0.72) 100%);
      backdrop-filter: blur(8px);
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      width: min(100%, 780px);
      max-height: min(86vh, 780px);
      overflow-y: auto;
      background: linear-gradient(180deg, #f4e1ea 0%, #e7d4e2 100%);
      border-radius: 22px;
      padding: 24px 24px 22px;
      box-shadow:
        0 40px 100px rgba(235, 30, 99, 0.25),
        0 16px 40px rgba(37, 60, 84, 0.18);
      border: 1px solid rgba(255,255,255,0.7);
      position: relative;
      animation: modalIn 0.24s ease;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #334155;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.95);
    }

    .panel-head {
      display: inline-block;
      background: linear-gradient(90deg, #eb1e63, #a855f7);
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 1.3rem;
      margin-bottom: 14px;
      line-height: 1.35;
      text-wrap: balance;
      max-width: calc(100% - 56px);
      box-shadow: 0 12px 28px rgba(235, 30, 99, 0.25);
    }

    .panel-topics {
      margin: 0 0 16px;
      font-size: 1.14rem;
      font-weight: 800;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-wrap: balance;
      line-height: 1.45;
    }

    .panel-section + .panel-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.55);
    }

    .panel-label {
      margin: 0 0 6px;
      font-size: 1.06rem;
      font-weight: 900;
    }

    .panel-text {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.65;
      color: #1f2937;
      max-width: 900px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1080px) {
      .problems-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .zoom-shell {
        width: 100%;
        transform: none;
      }

      .page {
        margin: 12px;
        padding-inline: 14px;
      }
      .page {
        padding-inline: 14px;
      }

      .problems-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .modal-card {
        padding: 18px 16px 18px;
      }

      .panel-head {
        font-size: 1.1rem;
      }

      .panel-topics {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      .zoom-shell {
        width: 100%;
        transform: none;
      }

      .page {
        padding-top: 22px;
      }

      .hero h2 {
        font-size: 2.6rem;
      }

      .problems-grid {
        grid-template-columns: 1fr;
      }

      .problem-trigger {
        min-height: 50px;
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <div class="zoom-shell">
    <main class="page">
    <header class="hero">
      <h1>יעד 12:</h1>
      <h2>צריכה וייצור אחראיים</h2>
      <p>
        לחצו על אחת התיבות כדי לפתוח מידע קצר, ברור ומסודר על הבעיה היומיומית,
        שילוב הנושאים והחיבור ליעד 12.
      </p>
    </header>

    <div class="mockup-wrap">
      <img src="hadmaya.png" alt="הדמיה של יעד 12" onerror="this.parentElement.style.display='none'" />
    </div>

    <p class="helper">כל תיבה נפתחת בלחיצה אחת ונסגרת בלחיצה חוזרת.</p>

    <section id="problemsSection" class="problems-grid" aria-label="רשימת בעיות יעד 12"></section>

    <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button id="modalClose" class="modal-close" type="button" aria-label="סגירה">×</button>
        <div id="modalContent"></div>
      </div>
    </div>
  </main>
  </div>

  <script>
    const yaad12Items = [
      {

        goal12: "חינוך לצריכה מודעת וצמצום קניות לא מתוכננות."
      },
      {
        id: 2,
        title: "המחיר השקוף",
        topics: "אתיקה + קניינות",
        dailyProblem: "חוסר ידיעה אם מותג אהוב מייצר בתנאים הוגנים, שומר על זכויות עובדים ופועל באחריות.",
        goal12: "קידום שקיפות בשרשרת האספקה וצרכנות אחראית."
      },
      {
        id: 3,
        title: "עומס דיגיטלי",
        topics: "ענן + הרגלים דיגיטליים",
        dailyProblem: "שמירה של אלפי תמונות, סרטונים וקבצים מיותרים בטלפון ובענן, בלי מודעות לבזבוז המשאבים הדיגיטליים.",
        goal12: "צמצום בזבוז דיגיטלי והרחבת המודעות לצריכה אחראית גם במרחב המקוון."
      },
      {
        id: 4,

        goal12: "הארכת חיי מוצר, שימוש חכם בפריטים קיימים וצמצום רכישות מיותרות."

      {
        id: 5,

        goal12: "הגברת מודעות לצריכה אחראית של מוצרים ולהרכב החומרים שלהם."

      {

        goal12: "קידום כלכלת שיתוף ושימוש יעיל יותר במשאבים קיימים."

        goal12: "עידוד תכנון מוצרים עמידים, ניתנים לתיקון ובעלי אורך חיים ארוך יותר."

      {

        goal12: "צמצום פסולת חד-פעמית ועידוד שימוש רב-פעמי."

      {
        id: 9,
        title: "תחתית נסתרת",

        goal12: "תכנון אריזות חכם שמאפשר ניצול מלא יותר של המוצר."
      },
      {
        id: 10,
        title: "סטייל חדש",
        topics: "עיצוב אופנה + מודולריות",
        dailyProblem: "רצון לגוון במראה של נעליים או פריטי אופנה מוביל לקנייה חוזרת של מוצרים שלמים במקום שינוי של חלקים בלבד.",
        goal12: "עיצוב מודולרי שמאריך את חיי המוצר ומפחית קנייה חדשה."
      },
      {
        id: 11,
        title: "קונות ולא משתמשות",
        topics: "קוסמטיקה + כלכלת שיתוף",
        dailyProblem: "רכישת מכשירים יקרים לעיצוב שיער או אביזרים מיוחדים שנשארים רוב הזמן ללא שימוש.",
        goal12: "מעבר ממודל של בעלות למודל של גישה, שיתוף וניצול יעיל יותר של מוצרים."
      },
      {
        id: 12,
        title: "ירוק מבחוץ",
        topics: "שיווק + גרינווש",
        dailyProblem: "מותגים מציגים מוצרים כידידותיים לסביבה בלי שהצרכנית באמת יודעת אם יש לכך בסיס אמיתי.",
        goal12: "חיזוק צרכנות ביקורתית ומניעת הטעיה סביבתית."
      },
      {
        id: 13,
        title: "חדר מתחלף",
        topics: "עיצוב החדר + חומרה",
        dailyProblem: "קנייה תכופה של קישוטים, תאורה, פוסטרים ואביזרים לחדר לפי טרנדים מתחלפים, גם כשאין בהם צורך ארוך טווח.",
        goal12: "צמצום ייצור וצריכה של פריטי דקורציה קצרי חיים."
      },
      {
        id: 14,
        title: "משלוח כפול",
        topics: "רשתות חברתיות + משלוחים",
        dailyProblem: "הזמנות אונליין מפוזרות ממספר אתרים עבור מוצרים קטנים, מה שיוצר יותר אריזות, יותר משלוחים ויותר זיהום.",
        goal12: "ייעול משלוחים, צמצום אריזות ועודף שינוע."
      },
      {
        id: 15,
        title: "לא נעים לארוז",
        topics: "חיי חברה + מנות עודפות",
        dailyProblem: "במסעדות או ביציאות חברתיות נשאר אוכל שלא נאכל, אבל פעמים רבות לא מבקשים לארוז והשאריות נזרקות.",
        goal12: "צמצום אובדן מזון בנקודת הצריכה."
      },
      {
        id: 16,
        title: "טראומת כביסה",
        topics: "אופנה + תחזוקה",
        dailyProblem: "בגד נהרס כבר בכביסה הראשונה בגלל חוסר הבנה של הסמלים, ההוראות והטיפול הנכון בבד.",
        goal12: "הקניית ידע לתחזוקה נכונה והארכת חיי מוצרים."
      },
      {
        id: 17,
        title: "מחסום רב-פעמי",
        topics: "היגיינה + אי-נוחות",
        dailyProblem: "גם כשיש רצון להשתמש במוצרים רב-פעמיים, יש קושי טכני או תחושת אי-נוחות בהתנהלות מחוץ לבית.",
        goal12: "הנגשת חלופות רב-פעמיות וצמצום שימוש במוצרים חד-פעמיים."

      {
        id: 18,
        title: "קונות כי צריך",
        topics: "מתנות + תרבות השפע",
        dailyProblem: "קנייה של מתנות קטנות ולא שימושיות רק כדי לא להגיע בידיים ריקות, גם כשהמוצר עצמו לא באמת נחוץ.",
        goal12: "צריכה מדויקת יותר וצמצום ייצור וקנייה של מוצרים מיותרים."
      },
      {
        id: 19,
        title: "תו אתי",
        topics: "בעלי חיים + ייצור אתי",
        dailyProblem: "קושי לדעת בזמן אמת אילו מוצרים באמת עומדים בסטנדרטים אתיים, כמו אי-ניסוי על בעלי חיים.",
        goal12: "קידום צריכה אתית ותמיכה בייצור אחראי."
      },
      {
        id: 20,
        title: "עומס מדיה",
        topics: "מידע דיגיטלי + תקשורת",
        dailyProblem: "שליחה חוזרת של סרטונים, תמונות וקבצים כבדים בקבוצות יוצרת עומס מיותר על מכשירים ואחסון.",
        goal12: "ניהול צריכה דיגיטלית יעילה וחיסכון במשאבים טכנולוגיים."
      }
    ];

    const section = document.getElementById("problemsSection");
    const modalOverlay = document.getElementById("modalOverlay");
    const modalContent = document.getElementById("modalContent");
    const modalClose = document.getElementById("modalClose");
    let openId = null;

    function formatTopics(text) {
      return text.replace(/\s*\+\s*/g, "<br><span aria-hidden=\"true\">+</span> ");
    }

    function closeModal() {
      openId = null;
      modalOverlay.classList.remove("open");
      modalOverlay.setAttribute("aria-hidden", "true");
      render();
    }

    function openModal(item) {
      openId = item.id;
      modalContent.innerHTML = `
        <div class="panel-head" id="modalTitle">${item.id}. ${item.title}</div>
        <p class="panel-topics">${formatTopics(item.topics)}</p>
        <div class="panel-section">
          <h3 class="panel-label">הבעיה היומיומית:</h3>
          <p class="panel-text">${item.dailyProblem}</p>
        </div>
        <div class="panel-section">
          <h3 class="panel-label">חיבור ליעד 12:</h3>
          <p class="panel-text">${item.goal12}</p>
        </div>
      `;
      modalOverlay.classList.add("open");
      modalOverlay.setAttribute("aria-hidden", "false");
      render();
    }

    function render() {
      section.innerHTML = "";

      yaad12Items.forEach((item) => {
        const wrapper = document.createElement("div");
        wrapper.className = "problem-item";

        const button = document.createElement("button");
        button.className = "problem-trigger" + (openId === item.id ? " active" : "");
        button.type = "button";
        button.setAttribute("aria-expanded", String(openId === item.id));
        button.setAttribute("aria-label", item.title);
        button.innerHTML = formatTopics(item.title);

        button.addEventListener("click", () => {
          if (openId === item.id) {
            closeModal();
          } else {
            openModal(item);
          }
        });

        wrapper.appendChild(button);
        section.appendChild(wrapper);
      });
    }

    modalClose.addEventListener("click", closeModal);

    modalOverlay.addEventListener("click", (event) => {
      if (event.target === modalOverlay) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && openId !== null) {
        closeModal();
      }
    });

    console.assert(Array.isArray(yaad12Items), "Test failed: yaad12Items should be an array");
    console.assert(yaad12Items.length === 20, "Test failed: expected 20 items");
    console.assert(typeof formatTopics("אופנה + אלגוריתמים") === "string", "Test failed: formatTopics should return a string");
    console.assert(formatTopics("אופנה + אלגוריתמים").includes("<br>"), "Test failed: formatTopics should insert a line break");

    render();
  </script>
