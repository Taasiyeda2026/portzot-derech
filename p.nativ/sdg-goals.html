<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>פורצות דרך ו־17 יעדי הפיתוח של האו״ם</title>
<style>
  body {
    font-family: "Arial", "Heebo", sans-serif;
    margin: 0;
    background: #faf7fb;
    color: #2b2b2b;
    line-height: 1.7;
  }
  .container {
    max-width: 1100px;
    margin: auto;
    padding: 24px;
  }
  h1 {
    text-align: center;
    color: #6b2d84;
    margin-bottom: 12px;
  }
  .intro {
    text-align: center;
    max-width: 760px;
    margin: 0 auto 32px;
    font-size: 1.05rem;
  }
  .hero-image {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: #ddd;
    margin: 32px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 0.95rem;
  }
  .goals {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .goal-btn {
    background: #ffffff;
    border: 2px solid #e3d6ea;
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    text-align: center;
    font-weight: bold;
    color: #6b2d84;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .goal-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 18px rgba(107,45,132,0.15);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  .modal {
    background: #fff;
    max-width: 560px;
    width: 90%;
    border-radius: 16px;
    padding: 24px;
    position: relative;
  }
  .modal h2 {
    color: #6b2d84;
    margin-top: 0;
  }
  .modal p {
    margin: 8px 0;
  }
  .close-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #6b2d84;
  }
</style>
</head>
<body>

<div class="container">
  <h1>פורצות דרך יוצרות עתיד: 17 יעדי הפיתוח של האו״ם</h1>

  <p class="intro">
    עולם משתנה נבנה בידי מנהיגות שמחברות חזון עם עשייה.  
    17 יעדי הפיתוח של האו״ם הם מצפן גלובלי – אבל גם כלי יומיומי עבור נשים מובילות,
    יזמיות ומנהלות המבקשות להשפיע, לחדש וליצור שינוי חברתי עמוק ובר־קיימא.
  </p>

  <div class="hero-image">
    כאן תופיע תמונה
  </div>

  <section class="goals">
    <button class="goal-btn" onclick="openModal(1)">יעד 1: מיגור העוני</button>
    <button class="goal-btn" onclick="openModal(2)">יעד 2: אפס רעב / אי ביטחון תזונתי</button>
    <button class="goal-btn" onclick="openModal(3)">יעד 3: בריאות טובה ורווחה אנושית</button>
    <button class="goal-btn" onclick="openModal(4)">יעד 4: חינוך איכותי</button>
    <button class="goal-btn" onclick="openModal(5)">יעד 5: שוויון מגדרי</button>
    <button class="goal-btn" onclick="openModal(6)">יעד 6: מים נקיים ותברואה</button>
    <button class="goal-btn" onclick="openModal(7)">יעד 7: אנרגיה זמינה ונקייה</button>
    <button class="goal-btn" onclick="openModal(8)">יעד 8: עבודה הוגנת וצמיחה כלכלית</button>
    <button class="goal-btn" onclick="openModal(9)">יעד 9: תעשייה, תשתיות וחדשנות</button>
    <button class="goal-btn" onclick="openModal(10)">יעד 10: צמצום אי השוויון</button>
    <button class="goal-btn" onclick="openModal(11)">יעד 11: ערים וקהילות מקיימות</button>
    <button class="goal-btn" onclick="openModal(12)">יעד 12: צריכה וייצור אחראים</button>
    <button class="goal-btn" onclick="openModal(13)">יעד 13: שינויי אקלים</button>
    <button class="goal-btn" onclick="openModal(14)">יעד 14: שימור המשאבים הימיים – חיים מתחת למים</button>
    <button class="goal-btn" onclick="openModal(15)">יעד 15: חיים על פני האדמה</button>
    <button class="goal-btn" onclick="openModal(16)">יעד 16: שלום, צדק וחוזק המוסדות</button>
    <button class="goal-btn" onclick="openModal(17)">יעד 17: שותפות להשגת היעדים</button>
  </section>
</div>

<div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="close-btn" aria-label="סגירה" onclick="closeModal()">×</button>
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const goalsContent = {
    1: {
      title: "יעד 1: מיגור העוני",
      text: [
        "היעד מבקש להבטיח קיום בכבוד וללא מחסור בסיסי.",
        "עוני פוגע ביציבות חברתית וביכולת של אנשים לממש פוטנציאל.",
        "כלכלה הוגנת מצמיחה קהילות חזקות ועמידות.",
        "מנהיגות נשית מעודדת פתרונות מערכתיים ורגישים לשטח.",
        "כל יוזמה מודעת היא צעד קטן בדרך לשינוי גדול."
      ]
    },
    2: {
      title: "יעד 2: אפס רעב / אי ביטחון תזונתי",
      text: [
        "המטרה היא זמינות מזון בטוח ומזין לכולן ולכולם.",
        "תזונה היא בסיס לבריאות, למידה ויציבות כלכלית.",
        "מערכות מזון חכמות מחזקות חקלאות וסביבה.",
        "נשים מובילות משפיעות על מדיניות מזון וחדשנות.",
        "בחירה מודעת יוצרת ביטחון לדורות הבאים."
      ]
    },
    3: {
      title: "יעד 3: בריאות טובה ורווחה אנושית",
      text: [
        "היעד עוסק בבריאות פיזית ונפשית לאורך החיים.",
        "בריאות חזקה מחזקת קהילות וכלכלה.",
        "מערכות בריאות שוויוניות מצמצמות פערים.",
        "מנהיגות נשית רואה את האדם במרכז.",
        "דאגה לרווחה היא השקעה עתידית."
      ]
    },
    4: {
      title: "יעד 4: חינוך איכותי",
      text: [
        "חינוך איכותי פותח הזדמנויות אמיתיות.",
        "למידה מצמצמת פערים ומקדמת צמיחה.",
        "חברות משכילות חזקות וחדשניות יותר.",
        "נשים מובילות יוצרות תרבות של ידע.",
        "כל השקעה בחינוך משנה מסלול חיים."
      ]
    },
    5: {
      title: "יעד 5: שוויון מגדרי",
      text: [
        "שוויון מגדרי הוא מנוע לצמיחה וצדק.",
        "העצמת נשים מחזקת משפחות וקהילות.",
        "שוק שוויוני מייצר חדשנות ויציבות.",
        "מנהיגות נשית שוברת תקרות זכוכית.",
        "כל קול נשי הוא חלק מהשינוי."
      ]
    },
    6: {
      title: "יעד 6: מים נקיים ותברואה",
      text: [
        "מים נקיים הם זכות בסיסית.",
        "תברואה מונעת מחלות ומצילה חיים.",
        "ניהול מים חכם מגן על הסביבה.",
        "נשים מובילות שינוי בקהילות מקומיות.",
        "בחירה סביבתית היא אחריות משותפת."
      ]
    },
    7: {
      title: "יעד 7: אנרגיה זמינה ונקייה",
      text: [
        "אנרגיה נקייה תומכת בעתיד בר־קיימא.",
        "גישה לאנרגיה מצמצמת פערים.",
        "חדשנות ירוקה מחזקת כלכלה.",
        "מנהיגות נשית מקדמת פתרונות נקיים.",
        "מעבר לאנרגיה חכמה מתחיל בהחלטה."
      ]
    },
    8: {
      title: "יעד 8: עבודה הוגנת וצמיחה כלכלית",
      text: [
        "עבודה הוגנת מבטיחה כבוד וביטחון.",
        "צמיחה כלכלית צריכה לכלול את כולם.",
        "תנאי עבודה משפיעים על רווחה.",
        "נשים מנהיגות תרבות ארגונית חדשה.",
        "כל ארגון יכול לבחור אחרת."
      ]
    },
    9: {
      title: "יעד 9: תעשייה, תשתיות וחדשנות",
      text: [
        "תשתיות חזקות בונות עתיד.",
        "חדשנות מניעה פתרונות חכמים.",
        "כלכלה מתקדמת נשענת על יצירתיות.",
        "מנהיגות נשית פורצת גבולות טכנולוגיים.",
        "רעיון אחד יכול לשנות מערכת."
      ]
    },
    10: {
      title: "יעד 10: צמצום אי השוויון",
      text: [
        "צמצום פערים מחזק יציבות חברתית.",
        "שוויון יוצר הזדמנויות הוגנות.",
        "חברה מגוונת היא חברה חזקה.",
        "נשים מובילות מדיניות מכלילה.",
        "מודעות היא הצעד הראשון."
      ]
    },
    11: {
      title: "יעד 11: ערים וקהילות מקיימות",
      text: [
        "קהילות מקיימות משפרות איכות חיים.",
        "תכנון חכם מחזק חוסן עירוני.",
        "סביבה בטוחה מעודדת שייכות.",
        "נשים מנהיגות מרחבים אנושיים.",
        "כל שינוי מקומי משפיע גלובלית."
      ]
    },
    12: {
      title: "יעד 12: צריכה וייצור אחראים",
      text: [
        "צריכה מודעת מגינה על משאבים.",
        "ייצור אחראי מצמצם נזק סביבתי.",
        "כלכלה חכמה חושבת לטווח ארוך.",
        "מנהיגות נשית משפיעה על בחירות.",
        "כל החלטה יוצרת השפעה."
      ]
    },
    13: {
      title: "יעד 13: שינויי אקלים",
      text: [
        "פעולה אקלימית הכרחית לעתיד.",
        "האקלים משפיע על כל תחום חיים.",
        "פתרונות ירוקים מחזקים קהילות.",
        "נשים מובילות מאבקים סביבתיים.",
        "העשייה מתחילה היום."
      ]
    },
    14: {
      title: "יעד 14: שימור המשאבים הימיים – חיים מתחת למים",
      text: [
        "ימים בריאים הם מקור חיים.",
        "הגנה ימית שומרת על מזון ותעסוקה.",
        "מערכות ימיות קריטיות לאקלים.",
        "נשים מובילות שימור וחדשנות.",
        "מודעות יוצרת אחריות משותפת."
      ]
    },
    15: {
      title: "יעד 15: חיים על פני האדמה",
      text: [
        "שמירה על טבע מגינה על האנושות.",
        "מערכות אקולוגיות מאזנות חיים.",
        "פגיעה בטבע פוגעת בכולנו.",
        "מנהיגות נשית שומרת על משאבים.",
        "הגנה היום היא ביטחון מחר."
      ]
    },
    16: {
      title: "יעד 16: שלום, צדק וחוזק המוסדות",
      text: [
        "מוסדות חזקים יוצרים אמון.",
        "צדק הוא בסיס לחברה מתפקדת.",
        "שלום מאפשר פיתוח וצמיחה.",
        "נשים מובילות תהליכי פיוס.",
        "אחריות אזרחית מחזקת דמוקרטיה."
      ]
    },
    17: {
      title: "יעד 17: שותפות להשגת היעדים",
      text: [
        "שיתופי פעולה מגבירים השפעה.",
        "אין שינוי ללא חיבור כוחות.",
        "שותפות יוצרת פתרונות רחבים.",
        "נשים מובילות רשתות עשייה.",
        "יחד – השינוי אפשרי."
      ]
    }
  };

  function openModal(id) {
    const overlay = document.getElementById("modalOverlay");
    document.getElementById("modalTitle").innerText = goalsContent[id].title;
    const contentDiv = document.getElementById("modalContent");
    contentDiv.innerHTML = "";
    goalsContent[id].text.forEach(sentence => {
      const p = document.createElement("p");
      p.innerText = sentence;
      contentDiv.appendChild(p);
    });
    overlay.style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
  }

  document.getElementById("modalOverlay").addEventListener("click", function(e){
    if (e.target === this) closeModal();
  });
</script>

</body>
</html>
