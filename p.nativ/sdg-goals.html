<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>17 היעדים | פורצות דרך</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Arial", "Heebo", sans-serif;
    margin: 0;
    background: linear-gradient(180deg, #fcf9fd 0%, #f7f1fa 100%);
    color: #2b2b2b;
    line-height: 1.7;
  }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(180, 152, 196, 0.22);
    box-shadow: 0 8px 24px rgba(107, 45, 132, 0.08);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #6b2d84;
    font-weight: 700;
  }

  .header-logo img {
    width: 42px;
    height: 42px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 6px 14px rgba(107, 45, 132, 0.16);
    border: 1px solid rgba(227, 214, 234, 0.8);
    background: #fff;
  }

  .home-link {
    width: 44px;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 1.25rem;
    background: linear-gradient(180deg, #ffffff 0%, #f4ebf8 100%);
    color: #6b2d84;
    border: 1px solid rgba(227, 214, 234, 0.95);
    border-radius: 14px;
    box-shadow: 0 8px 18px rgba(107, 45, 132, 0.14);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .home-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(107, 45, 132, 0.18);
  }

  .container {
    max-width: 1400px;
    margin: auto;
    padding: 28px 24px 40px;
  }

  .page-title {
    text-align: center;
    margin: 4px 0 18px;
    font-size: clamp(2rem, 4vw, 2.9rem);
    font-weight: 800;
    color: #6b2d84;
    line-height: 1.15;
    letter-spacing: -0.02em;
    text-shadow: 0 1px 0 rgba(255,255,255,0.82);
  }

  .intro {
    text-align: center;
    max-width: 860px;
    margin: 0 auto 28px;
    font-size: 1.08rem;
    color: #4f3b5f;
    background: rgba(255, 255, 255, 0.72);
    padding: 18px 22px;
    border-radius: 20px;
    border: 1px solid rgba(227, 214, 234, 0.95);
    box-shadow: 0 12px 28px rgba(107, 45, 132, 0.08);
  }

  .goals-stage {
    position: relative;
    width: min(1320px, 100%);
    height: 820px;
    margin: 0 auto;
  }

  .hero-image {
    position: absolute;
    top: 205px;
    left: 50%;
    transform: translateX(-50%);
    width: 270px;
    height: 270px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #ffffff 0%, #f8effb 72%, #f1e3f7 100%);
    box-shadow: 0 14px 34px rgba(107, 45, 132, 0.18);
    border: 4px solid rgba(255, 255, 255, 0.96);
    padding: 18px;
    z-index: 2;
  }

  .hero-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
    display: block;
  }

  .goal-slot {
    position: absolute;
    width: 196px;
    z-index: 3;
  }

  .goal-btn {
    width: 196px;
    height: 74px;
    background: linear-gradient(180deg, #ffffff 0%, #f7f0fa 100%);
    border: 1px solid rgba(214, 190, 225, 0.95);
    border-radius: 16px;
    padding: 8px 10px;
    cursor: pointer;
    text-align: center;
    font-weight: 700;
    font-size: 0.83rem;
    line-height: 1.25;
    color: #6b2d84;
    text-shadow: 0 1px 0 rgba(255,255,255,0.85);
    box-shadow: 0 10px 22px rgba(107,45,132,0.09), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .goal-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 26px rgba(107,45,132,0.15), inset 0 1px 0 rgba(255,255,255,0.95);
    border-color: rgba(176, 128, 198, 0.95);
  }

  /* מיקומים לפי הסקיצה */

  /* למעלה - 4 תיבות */
  .pos-top-left-1  { top: 0;   left: 50%; transform: translateX(-212px); }
  .pos-top-right-1 { top: 0;   left: 50%; transform: translateX(18px); }
  .pos-top-left-2  { top: 100px; left: 50%; transform: translateX(-212px); }
  .pos-top-right-2 { top: 100px; left: 50%; transform: translateX(18px); }

  /* שמאל - 4 תיבות */
  .pos-left-upper  { top: 170px; left: 215px; }
  .pos-left-mid    { top: 270px; left: 215px; }
  .pos-left-lower  { top: 370px; left: 215px; }
  .pos-left-far    { top: 270px; left: 0; }

  /* ימין - 4 תיבות */
  .pos-right-upper { top: 170px; right: 215px; }
  .pos-right-mid   { top: 270px; right: 215px; }
  .pos-right-lower { top: 370px; right: 215px; }
  .pos-right-far   { top: 270px; right: 0; }

  /* למטה - 5 תיבות */
  .pos-bottom-left-1  { top: 470px; left: 50%; transform: translateX(-212px); }
  .pos-bottom-right-1 { top: 470px; left: 50%; transform: translateX(18px); }
  .pos-bottom-left-2  { top: 570px; left: 50%; transform: translateX(-212px); }
  .pos-bottom-right-2 { top: 570px; left: 50%; transform: translateX(18px); }
  .pos-bottom-center  { top: 670px; left: 50%; transform: translateX(-50%); }

  .bottom-action {
    display: flex;
    justify-content: center;
    margin-top: 30px;
  }

  .next-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 13px 24px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 700;
    font-size: 0.98rem;
    letter-spacing: 0.2px;
    border-radius: 999px;
    background: linear-gradient(135deg, #7b3696 0%, #c04aa6 100%);
    box-shadow: 0 14px 28px rgba(127, 56, 151, 0.28);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 32px rgba(127, 56, 151, 0.34);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(31, 16, 39, 0.56);
    justify-content: center;
    align-items: center;
    z-index: 999;
    padding: 20px;
  }

  .modal {
    background: #fff;
    max-width: 420px;
    width: 100%;
    border-radius: 20px;
    padding: 24px;
    position: relative;
    box-shadow: 0 24px 50px rgba(30, 18, 40, 0.22);
  }

  .modal h2 {
    color: #6b2d84;
    margin-top: 0;
    margin-bottom: 10px;
  }

  .modal p {
    margin: 8px 0;
  }

  .close-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #6b2d84;
  }

  @media (max-width: 1100px) {
    .goals-stage {
      position: static;
      width: 100%;
      height: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      justify-items: center;
    }

    .hero-image {
      position: static;
      transform: none;
      grid-column: 1 / -1;
      margin: 0 auto 10px;
      width: 220px;
      height: 220px;
    }

    .goal-slot {
      position: static;
      width: 100%;
      display: flex;
      justify-content: center;
      transform: none !important;
    }
  }

  @media (max-width: 640px) {
    .header-inner {
      padding: 10px 16px;
    }

    .header-logo span {
      display: none;
    }

    .container {
      padding: 20px 16px 32px;
    }

    .page-title {
      margin-bottom: 14px;
      font-size: 1.9rem;
    }

    .intro {
      font-size: 1rem;
      padding: 16px 18px;
    }

    .goals-stage {
      grid-template-columns: 1fr;
    }

    .goal-btn {
      width: 100%;
      max-width: 196px;
      height: 74px;
      font-size: 0.82rem;
    }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="header-logo" href="enter.html" aria-label="לוגו העמוד">
      <img src="../icon/logo.png" alt="לוגו פורצות דרך">
      <span>פורצות דרך</span>
    </a>

    <a class="home-link" href="enter.html" aria-label="חזרה לדף הבית" title="דף הבית">🏠</a>
  </div>
</header>

<div class="container">
  <h1 class="page-title">17 היעדים</h1>

  <p class="intro">
    עולם משתנה נבנה בידי מנהיגות שמחברת בין חזון לעשייה. 17 יעדי הפיתוח של האו״ם הם מסגרת לחשיבה ולעשייה ומשמשים נקודת פתיחה לזיהוי אתגרים, הבנת צרכים ופיתוח מיזמים שמבקשים ליצור שינוי.
  </p>

  <section class="goals-stage">
    <div class="hero-image">
      <img src="../icon/sdg.png" alt="יעדי הפיתוח של האו״ם">
    </div>

    <!-- למעלה -->
    <div class="goal-slot pos-top-left-1"><button class="goal-btn" onclick="openModal(1)">יעד 1: מיגור העוני</button></div>
    <div class="goal-slot pos-top-right-1"><button class="goal-btn" onclick="openModal(2)">יעד 2: אפס רעב / אי ביטחון תזונתי</button></div>
    <div class="goal-slot pos-top-left-2"><button class="goal-btn" onclick="openModal(3)">יעד 3: בריאות טובה ורווחה אנושית</button></div>
    <div class="goal-slot pos-top-right-2"><button class="goal-btn" onclick="openModal(4)">יעד 4: חינוך איכותי</button></div>

    <!-- שמאל -->
    <div class="goal-slot pos-left-upper"><button class="goal-btn" onclick="openModal(5)">יעד 5: שוויון מגדרי</button></div>
    <div class="goal-slot pos-left-mid"><button class="goal-btn" onclick="openModal(6)">יעד 6: מים נקיים ותברואה</button></div>
    <div class="goal-slot pos-left-lower"><button class="goal-btn" onclick="openModal(7)">יעד 7: אנרגיה זמינה ונקייה</button></div>
    <div class="goal-slot pos-left-far"><button class="goal-btn" onclick="openModal(8)">יעד 8: עבודה הוגנת וצמיחה כלכלית</button></div>

    <!-- ימין -->
    <div class="goal-slot pos-right-upper"><button class="goal-btn" onclick="openModal(9)">יעד 9: תעשייה, תשתיות וחדשנות</button></div>
    <div class="goal-slot pos-right-mid"><button class="goal-btn" onclick="openModal(10)">יעד 10: צמצום אי השוויון</button></div>
    <div class="goal-slot pos-right-lower"><button class="goal-btn" onclick="openModal(11)">יעד 11: ערים וקהילות מקיימות</button></div>
    <div class="goal-slot pos-right-far"><button class="goal-btn" onclick="openModal(12)">יעד 12: צריכה וייצור אחראים</button></div>

    <!-- למטה -->
    <div class="goal-slot pos-bottom-left-1"><button class="goal-btn" onclick="openModal(13)">יעד 13: שינויי אקלים</button></div>
    <div class="goal-slot pos-bottom-right-1"><button class="goal-btn" onclick="openModal(14)">יעד 14: שימור המשאבים הימיים – חיים מתחת למים</button></div>
    <div class="goal-slot pos-bottom-left-2"><button class="goal-btn" onclick="openModal(15)">יעד 15: חיים על פני האדמה</button></div>
    <div class="goal-slot pos-bottom-right-2"><button class="goal-btn" onclick="openModal(16)">יעד 16: שלום, צדק וחוזק המוסדות</button></div>
    <div class="goal-slot pos-bottom-center"><button class="goal-btn" onclick="openModal(17)">יעד 17: שותפות להשגת היעדים</button></div>
  </section>

  <div class="bottom-action">
    <a class="next-btn" href="/p.nativ/game/index.html">לבחירת תחום</a>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="close-btn" aria-label="סגירה" onclick="closeModal()">×</button>
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const goalsContent = {
    1: {
      title: "יעד 1: מיגור העוני",
      text: [
        "היעד מבקש להבטיח קיום בכבוד וללא מחסור בסיסי.",

        "מערכות מזון חכמות מחזקות חקלאות וסביבה.",
        "נשים מובילות משפיעות על מדיניות מזון וחדשנות.",
        "בחירה מודעת יוצרת ביטחון לדורות הבאים."
      ]
    },
    3: {
      title: "יעד 3: בריאות טובה ורווחה אנושית",
      text: [
        "היעד עוסק בבריאות פיזית ונפשית לאורך החיים.",
        "בריאות חזקה מחזקת קהילות וכלכלה.",
        "מערכות בריאות שוויוניות מצמצמות פערים.",
        "מנהיגות נשית רואה את האדם במרכז.",
        "דאגה לרווחה היא השקעה עתידית."

    },
    4: {
      title: "יעד 4: חינוך איכותי",

    5: {
      title: "יעד 5: שוויון מגדרי",
      text: [

    7: {

    },
    16: {
      title: "יעד 16: שלום, צדק וחוזק המוסדות",
      text: [
        "מוסדות חזקים יוצרים אמון.",
        "צדק הוא בסיס לחברה מתפקדת.",
        "שלום מאפשר פיתוח וצמיחה.",
        "נשים מובילות תהליכי פיוס.",
        "אחריות אזרחית מחזקת דמוקרטיה."
      ]
    },
    17: {
      title: "יעד 17: שותפות להשגת היעדים",
      text: [
        "שיתופי פעולה מגבירים השפעה.",
        "אין שינוי ללא חיבור כוחות.",
        "שותפות יוצרת פתרונות רחבים.",
        "נשים מובילות רשתות עשייה.",
        "יחד – השינוי אפשרי."
      ]
    }
  };

  function openModal(id) {
    const overlay = document.getElementById("modalOverlay");
    document.getElementById("modalTitle").innerText = goalsContent[id].title;
    const contentDiv = document.getElementById("modalContent");
    contentDiv.innerHTML = "";
    goalsContent[id].text.forEach(sentence => {
      const p = document.createElement("p");
      p.innerText = sentence;
      contentDiv.appendChild(p);
    });
    overlay.style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
  }

  document.getElementById("modalOverlay").addEventListener("click", function(e){
    if (e.target === this) closeModal();
  });
</script>

</body>
