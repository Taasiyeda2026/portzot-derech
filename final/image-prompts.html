<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>פרומפטים לתמונות</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../config/supabase-config.js"></script><style>body{font-family:Rubik,Arial;margin:20px}.card{border:1px solid #ddd;border-radius:12px;padding:12px;margin:10px 0}textarea{width:100%;min-height:90px}.meta{color:#555}</style></head><body><h1>פרומפטים לתמונות לפי קבוצה</h1><p id="status">טוען…</p><div id="meta" class="meta"></div><div id="prompts"></div><script>(async function(){const p=new URLSearchParams(location.search);const groupCode=p.get('group');const status=document.getElementById('status');if(!groupCode){status.textContent='חסר פרמטר group';return;}const client=window.supabase.createClient(window.PORTZOT_SUPABASE_URL,window.PORTZOT_SUPABASE_ANON_KEY);const {data,error}=await client.from('pitch_groups').select('*').eq('group_code',groupCode).single();if(error||!data){status.textContent='שגיאה בטעינת הקבוצה';return;}const dj=data.data_json||{};const project=data.project_name||dj.project_name||'';const speakers=[data.speaker_1,data.speaker_2,data.speaker_3,data.speaker_4,data.speaker_5].filter(Boolean);const g=(k)=>String(dj[k]||'').trim();const base={project,problem:g('problem'),audience:g('audience'),main_need:g('main_need'),idea:g('idea'),product_action:g('product_action'),prototype:g('prototype_description'),uniqueness:g('tech_part'),value:g('main_value')};document.getElementById('meta').textContent=`קבוצה: ${groupCode} | מיזם: ${project||'—'} | מציגות: ${speakers.join(', ')||'—'}`;const prompts=[['תמונת בעיה',`Create a realistic image for teens age 15 showing the core problem: ${base.problem}. Target audience: ${base.audience}. Style: empowering, not childish.`],['תמונת פתרון',`Create a realistic image showing the solution idea: ${base.idea}. Need addressed: ${base.main_need}. Project: ${project}.`],['תמונת מוצר / אפליקציה',`Generate a product/app concept image for "${project}". What it does: ${base.product_action}. Unique part: ${base.uniqueness}.`],['תמונת שימוש',`Show users from target audience (${base.audience}) using ${project} in real life. Highlight: ${base.value}.`],['תמונת אווירה / קהל יעד',`Create an atmosphere image representing the target audience (${base.audience}) and their day-to-day challenge (${base.problem}).`],['תמונה לפוסטר',`Poster-ready hero image for project "${project}". Include visual hint to prototype: ${base.prototype}. Keep clean composition for school innovation poster.`]];document.getElementById('prompts').innerHTML=prompts.map((row,i)=>`<div class='card'><h3>${i+1}. ${row[0]}</h3><textarea readonly id='p${i}'>${row[1]}</textarea><button data-copy='p${i}'>העתקה</button></div>`).join('');document.getElementById('prompts').addEventListener('click',async(e)=>{const id=e.target.getAttribute('data-copy');if(!id)return;const t=document.getElementById(id);await navigator.clipboard.writeText(t.value);e.target.textContent='הועתק';setTimeout(()=>e.target.textContent='העתקה',1200);});status.textContent='נטען בהצלחה';})();</script></body></html>
