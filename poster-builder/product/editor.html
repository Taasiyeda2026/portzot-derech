<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פוסטר חקר | פורצות דרך</title>
  <link rel="icon" type="image/png" href="../../icon/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@400;700;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== פונטים מקומיים ===== */
    @font-face {
      font-family: 'Gveret Levin';
      src: url('/poster-builder/assets/fonts/GveretLevin-Regular.ttf') format('truetype');
      font-weight: 400 700 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'Alef';
      src: url('/poster-builder/assets/fonts/Alef-regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'Alef';
      src: url('/poster-builder/assets/fonts/Alef-bold.ttf') format('truetype');
      font-weight: 700 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'Alice';
      src: url('/poster-builder/assets/fonts/Alice-Regular.ttf') format('truetype');
      font-weight: 400 700 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'Choco';
      src: url('/poster-builder/assets/fonts/Choco.otf') format('opentype');
      font-weight: 400 700 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'Yehuda';
      src: url('/poster-builder/assets/fonts/yehudaclm-bold-webfont.woff') format('woff'),
           url('/poster-builder/assets/fonts/yehudaclm-bold-webfont.ttf') format('truetype');
      font-weight: 400 700 900;
      font-style: normal;
      font-display: block;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f3f0fa; font-family: 'IBM Plex Sans Hebrew', 'Rubik', sans-serif; direction: rtl; min-height: 100vh; }

    /* ===== סרגל עליון ===== */
    .poster-bar {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #4a1f40, #5E2750);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px; gap: 12px;
      box-shadow: 0 4px 16px rgba(94,39,80,.35);
    }
    .poster-bar-right { display: flex; align-items: center; gap: 10px; }
    .poster-bar img { height: 36px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
    .poster-bar-title { color: #fff; font-weight: 700; font-size: 15px; }
    .poster-bar-actions { display: flex; gap: 10px; align-items: center; }
    .bar-btn {
      border: none; border-radius: 10px; padding: 8px 18px; cursor: pointer;
      font: inherit; font-weight: 600; font-size: 14px; transition: .18s ease;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .bar-btn.back { background: rgba(255,255,255,.15); color: #fff; border: 1.5px solid rgba(255,255,255,.3); }
    .bar-btn.back:hover { background: rgba(255,255,255,.25); }
    .bar-btn.export { background: linear-gradient(135deg, #d61f8c, #9b40c0); color: #fff; box-shadow: 0 4px 14px rgba(214,31,140,.4); }
    .bar-btn.export:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(214,31,140,.5); }
    .bar-btn.finish { background: linear-gradient(135deg, #1a5c3a, #27ae60); color: #fff; box-shadow: 0 4px 14px rgba(26,92,58,.35); white-space: nowrap; }
    .bar-btn.finish:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(26,92,58,.45); }
    .bar-btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    /* ===== עטיפת הפוסטר ===== */
    .poster-page {
      display: flex; justify-content: center;
      width: 100%; box-sizing: border-box;
      padding: 32px 20px 60px;
      direction: ltr;
    }
    .poster-scale-wrapper {
      --poster-scale: 1;
      width: calc(794px * var(--poster-scale));
      height: calc(1123px * var(--poster-scale));
      margin-inline: auto;
      flex: 0 0 auto;
    }
    .poster-scale-inner {
      width: 794px;
      height: 1123px;
      transform-origin: top center;
      transform: scale(var(--poster-scale));
    }

    /* ===== מבנה הפוסטר ===== */
    #poster-html {
      width: 794px; height: 1123px; min-height: 1123px; max-height: 1123px;
      position: relative; overflow: visible;
      direction: rtl; unicode-bidi: isolate; background: #fff;
      display: flex; flex-direction: column;
      box-shadow: 0 16px 56px rgba(94,39,80,.22), 0 4px 16px rgba(0,0,0,.1);
    }
    #poster-inner,
    #poster-html .ph-card,
    #poster-html .ph-cap,
    #poster-html .ph-body,
    #poster-html .ph-sub,
    #poster-html .ph-bullets,
    #poster-html .ph-bullets li,
    #poster-html #ph-name,
    #poster-html #ph-desc,
    #poster-html #ph-names,
    #poster-html #ph-school,
    #poster-html #ph-slogan {
      direction: rtl;
      unicode-bidi: plaintext;
    }
    #poster-bg { position: absolute; inset: 0; z-index: 0; }

    /* ===== כרטיסיות פוסטר ===== */
    .ph-card {
      background: rgba(255, 255, 255, .98);
      border: 1px solid rgba(94,39,80,.14);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .ph-card-accent {
      background: linear-gradient(135deg, rgba(255, 255, 255, .99), rgba(250, 244, 255, .98));
      border: 1.5px solid rgba(94,39,80,.28);
      border-right: 3.5px solid var(--ph-title-color, #5E2750);
    }
    .ph-card-accent .ph-body {
      color: var(--ph-title-color, #5E2750);
      font-weight: 400;
      font-size: 12.5px;
    }
    .ph-cap {
      font-size: 13.5px; font-weight: 900; color: var(--ph-title-color, #5E2750);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
    }
    .ph-cap,
    #ph-images-label {
      text-shadow: none;
      filter: none;
    }
    .ph-cap::before {
      content: ''; display: inline-block;
      width: 5px; height: 5px; background: var(--ph-title-color, #5E2750); border-radius: 50%;
      flex-shrink: 0;
    }
    .ph-cap[data-icon-ok="true"]::before {
      width: 33px; height: 33px; border-radius: 0;
      background-color: transparent;
      background-image: var(--ph-icon-url);
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      -webkit-mask: none;
      mask: none;
    }
    #ph-audience[data-icon-ok="true"]::before {
      content: ''; display: inline-block;
      width: 18px; height: 18px; border-radius: 0;
      background-color: transparent;
      background-image: var(--ph-icon-url);
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      -webkit-mask: none;
      mask: none;
      flex-shrink: 0;
    }
    .ph-body { font-size: 12px; font-weight: 400; color: var(--ph-text-color, #1f1030); line-height: 1.72; word-break: break-word; overflow-wrap: anywhere; }
    .ph-sub  { font-size: 10.5px; font-weight: 400; color: #8a7aa0; margin-top: 4px; line-height: 1.58; }
    .ph-bullets {
      list-style-position: outside;
      margin-top: 3px;
      padding: 0;
      padding-inline-start: 0;
      padding-inline-end: 14px;
    }
    .ph-bullets li {
      display: list-item;
      list-style-type: none;
      font-size: 12px; font-weight: 400; color: var(--ph-text-color, #1f1030); line-height: 1.65;
      margin-bottom: 3px;
      padding-right: 0;
    }
    .ph-bullets li::marker {
      content: "◆\00a0\00a0";
      color: var(--ph-title-color, #5E2750);
      font-size: 6px;
    }
    .ph-img-frame {
      border-radius: 12px; overflow: visible;
      border: 2px solid rgba(94,39,80,.18);
      background: #f5eef2;
      box-shadow: 0 4px 16px rgba(94,39,80,.12);
      display: flex; align-items: center; justify-content: center;
    }
    .ph-notch { position: relative; border-radius: 16px; }
    .ph-notch::before {
      content: ''; position: absolute; top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 26px; height: 4px; background: #d0b0c8;
      border-radius: 2px; z-index: 2;
    }

    /* ── Poster layout ── */
    #poster-html { --ph-extra-image-scale: 1; }
    #ph-main {
      flex: 1 1 auto !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: space-between !important;
    }
    #ph-images-2, #ph-images-app, #ph-images-web { justify-content: center; align-items: start; }


    /* ===== שדרוג פריסת הפוסטר המיוצא ===== */
    #ph-header {
      padding: 66px 32px 30px;
      text-align: center;
      position: relative;
      flex-shrink: 0;
    }
    #ph-logo-wrap {
      position: absolute;
      top: 8px;
      left: 16px;
      z-index: 5;
      filter: none;
      box-shadow: none;
      text-shadow: none;
      opacity: 1;
      mix-blend-mode: normal;
    }
    #ph-logo-wrap img {
      height: 110px;
      width: auto;
      object-fit: contain;
      display: block;
      filter: none;
      box-shadow: none;
      text-shadow: none;
      opacity: 1;
      mix-blend-mode: normal;
    }
    #ph-title-line {
      max-width: 360px;
    }
    #ph-main {
      gap: 8px !important;
      padding: 0 24px 14px !important;
      justify-content: flex-start !important;
    }
    .ph-grid-problem,
    .ph-grid-solution {
      gap: 13px !important;
    }
    .ph-grid-problem {
      margin-bottom: 2px;
    }
    .ph-grid-research {
      grid-template-columns: 1.1fr .8fr 1.1fr !important;
      gap: 10px !important;
      margin-top: 1px;
    }
    .ph-grid-solution {
      grid-template-columns: 1fr 1fr !important;
      gap: 18px !important;
      margin-top: 9px;
    }
    .ph-grid-process {
      grid-template-columns: minmax(0, 1fr) 24px minmax(0, 1fr) 24px minmax(0, 1fr) !important;
      gap: 8px !important;
      align-items: stretch;
      margin-top: 11px;
    }
    .ph-grid-process .ph-card {
      min-width: 0;
    }
    .ph-process-arrow {
      position: relative;
      align-self: center;
      height: 16px;
      color: var(--ph-title-color, #5E2750);
      filter: none;
    }
    .ph-process-arrow::before {
      content: '';
      position: absolute;
      left: 5px;
      right: 3px;
      top: 50%;
      height: 2.5px;
      transform: translateY(-50%);
      background: currentColor;
      border-radius: 999px;
      opacity: 1;
    }
    .ph-process-arrow::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 8px solid currentColor;
      opacity: 1;
    }
    .ph-audience-card {
      padding: 4px 14px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 0;
      margin-bottom: 10px;
    }
    .ph-audience-card #ph-audience {
      color: var(--ph-title-color, #5E2750) !important;
      font-weight: 700 !important;
      font-size: 11.5px !important;
      margin-top: 0;
      text-align: center;
      line-height: 1.45;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .ph-card-compact {
      padding-top: 8px;
      padding-bottom: 8px;
    }
    .ph-images-wrap {
      flex-shrink: 0;
      margin-block: 0 12px;
    }
    #ph-images-label {
      display: flex !important;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    #ph-images-2 {
      gap: 14px !important;
    }
    #ph-images-app,
    #ph-images-web {
      gap: 11px !important;
    }
    .ph-solution-card {
      text-align: center;
    }
    .ph-solution-card #ph-solution {
      text-align: center;
      color: var(--ph-title-color, #5E2750) !important;
      font-size: 13.8px !important;
      font-weight: 700 !important;
      line-height: 1.72;
    }

    #ph-footer,
    #ph-footer * {
      filter: none !important;
      text-shadow: none !important;
      box-shadow: none !important;
      opacity: 1;
      mix-blend-mode: normal !important;
    }

    /* ===== רספונסיבי ===== */
    @media (max-width: 860px) {
      .poster-page { padding: 16px 0 40px; overflow-x: auto; }
    }

    /* ===== ייצוא PDF מקצועי דרך הדפסת דפדפן אמיתית ===== */
    @page { size: A4 portrait; margin: 0; }
    @media print {
      html, body {
        width: 210mm; height: 297mm;
        margin: 0; padding: 0;
        background: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body * { visibility: hidden !important; }
      #poster-html, #poster-html * { visibility: visible !important; }
      #poster-html {
        position: fixed !important;
        inset: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        min-height: 297mm !important;
        max-height: 297mm !important;
        margin: 0 !important;
        box-shadow: none !important;
        transform: none !important;
        overflow: hidden !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        break-before: avoid !important;
        break-after: avoid !important;
        break-inside: avoid !important;
      }
      .poster-scale-wrapper, .poster-scale-inner {
        width: 210mm !important;
        height: 297mm !important;
        transform: none !important;
      }
      #poster-inner {
        width: 210mm !important;
        height: 297mm !important;
        transform: none !important;
        overflow: hidden !important;
      }
      .poster-bar { display: none !important; }
    }
  </style>
</head>
<body>

<div class="poster-bar">
  <div class="poster-bar-right">
    <img src="../../icon/favicon.png" alt="פורצות דרך" />
    <span class="poster-bar-title">פוסטר החקר שלנו</span>
  </div>
  <div class="poster-bar-actions">
    <button class="bar-btn back" id="btn-back">‹ חזרה</button>
    <button class="bar-btn export" id="btn-export">ייצוא PDF</button>
    <button class="bar-btn finish" id="btn-finish">סיום ›</button>
  </div>
</div>

<div class="poster-page">
  <div class="poster-scale-wrapper">
    <div class="poster-scale-inner">
    <div id="poster-html">
      <div id="poster-bg"></div>
      <div id="poster-inner" style="position:relative;z-index:1;display:flex;flex-direction:column;height:1123px">

        <!-- כותרת -->
        <div id="ph-header">
          <div id="ph-logo-wrap">
            <img src="/poster-builder/assets/logoposter.svg" alt="פורצות דרך" crossorigin="anonymous" />
          </div>

          <div id="ph-name" style="font-weight:900;line-height:1.1;margin-bottom:14px;word-break:break-word;overflow-wrap:anywhere"></div>
          <div id="ph-title-line" style="height:3px;background:linear-gradient(90deg,#5E2750,#d61f8c);border-radius:2px;margin:0 auto 10px;transition:width .2s ease"></div>
          <div id="ph-desc" style="font-size:15.5px;font-weight:700;max-width:480px;margin:0 auto;line-height:1.65;display:inline-block;background:rgba(255,255,255,0.72);padding:6px 12px;border-radius:10px"></div>
          <div id="ph-team" style="background:rgba(255,255,255,.96);border:1px solid rgba(94,39,80,.2);border-radius:10px;padding:7px 14px;width:fit-content;max-width:390px;margin:8px auto 0">
            <div id="ph-names" style="font-size:10px;font-weight:400;line-height:1.65"></div>
            <div id="ph-school" style="font-size:9px;font-weight:400;line-height:1.45;margin-top:2px"></div>
          </div>
        </div>

        <div id="ph-main" style="display:flex;flex-direction:column;gap:4px;padding:0 24px 6px;flex:1 1 auto;justify-content:flex-start">
        <!-- שורה: בעיה + שאלת חקר -->
        <div class="ph-grid-problem" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;flex-shrink:0">
          <div class="ph-card ph-card-compact">
            <div class="ph-cap" data-icon="prob">הבעיה שזיהינו</div>
            <div id="ph-problem" class="ph-body"></div>
          </div>
          <div class="ph-card ph-card-compact">
            <div class="ph-cap" data-icon="rq">שאלת החקר</div>
            <div id="ph-rq" class="ph-body"></div>
          </div>
        </div>

        <!-- קהל יעד -->
        <div class="ph-card ph-audience-card">
          <div id="ph-audience" class="ph-sub" data-icon="aud"></div>
        </div>

        <!-- תמונות -->
        <div class="ph-images-wrap">
          <div id="ph-images-label" style="font-size:7.5px;font-weight:700;color:#5E2750;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:4px"></div>

          <!-- פיזי: 2 תמונות -->
          <div id="ph-images-2" style="display:none;grid-template-columns:1fr 1fr;gap:10px">
            <div class="ph-img-frame" data-ph-img="0" data-layout="physical"></div>
            <div class="ph-img-frame" data-ph-img="1" data-layout="physical"></div>
          </div>

          <!-- אפליקציה: 3 תמונות אנכיות -->
          <div id="ph-images-app" style="display:none;grid-template-columns:1fr 1fr 1fr;gap:7px">
            <div class="ph-img-frame ph-notch" data-ph-img="0" data-layout="app"></div>
            <div class="ph-img-frame ph-notch" data-ph-img="1" data-layout="app"></div>
            <div class="ph-img-frame ph-notch" data-ph-img="2" data-layout="app"></div>
          </div>

          <!-- אתר/דיגיטלי: 3 תמונות רוחביות -->
          <div id="ph-images-web" style="display:none;grid-template-columns:1fr 1fr 1fr;gap:7px">
            <div class="ph-img-frame" data-ph-img="0" data-layout="website"></div>
            <div class="ph-img-frame" data-ph-img="1" data-layout="website"></div>
            <div class="ph-img-frame" data-ph-img="2" data-layout="website"></div>
          </div>
        </div>

        <!-- שורה: חקר + תובנות + דרישות -->
        <div class="ph-grid-research" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;flex-shrink:0">
          <div class="ph-card">
            <div class="ph-cap" data-icon="res">החקר שביצענו</div>
            <ul id="ph-research" class="ph-bullets"></ul>
          </div>
          <div class="ph-card">
            <div class="ph-cap" data-icon="ins">תובנות מהחקר</div>
            <div id="ph-findings" class="ph-body"></div>
          </div>
          <div class="ph-card">
            <div class="ph-cap" data-icon="req">דרישות הפתרון</div>
            <ul id="ph-reqs" class="ph-bullets"></ul>
          </div>
        </div>

        <!-- שורה: פתרון + שימוש -->
        <div class="ph-grid-solution" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;flex-shrink:0">
          <div class="ph-card ph-solution-card">
            <div id="ph-solution-cap" class="ph-cap" data-icon="sol"></div>
            <div id="ph-solution" class="ph-body"></div>
          </div>
          <div class="ph-card">
            <div id="ph-usage-cap" class="ph-cap" data-icon="use"></div>
            <ul id="ph-usage" class="ph-bullets"></ul>
          </div>
        </div>

        <!-- שורה: משוב + שיפורים + ערך -->
        <div class="ph-grid-process" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;flex-shrink:0">
          <div class="ph-card ph-card-accent">
            <div class="ph-cap" data-icon="fb">המשוב שקיבלנו</div>
            <div id="ph-feedback" class="ph-body"></div>
          </div>
          <div class="ph-process-arrow" aria-hidden="true"></div>
          <div class="ph-card ph-card-accent">
            <div class="ph-cap" data-icon="imp">מה שיפרנו</div>
            <div id="ph-improved" class="ph-body"></div>
          </div>
          <div class="ph-process-arrow" aria-hidden="true"></div>
          <div class="ph-card ph-card-accent">
            <div class="ph-cap" data-icon="val">הערך המרכזי</div>
            <div id="ph-value" class="ph-body"></div>
          </div>
        </div>

        </div>

        <!-- פוטר -->
        <div id="ph-footer" style="background:var(--ph-title-color,#5E2750);padding:10px 30px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;flex-shrink:0">
          <div id="ph-slogan" style="font-style:italic;font-size:13px;color:#ffffff;text-align:center;margin:0 auto"></div>
        </div>

      </div>
    </div>
    </div>
  </div>
</div>

<script type="module">
  import { loadProject } from '../src/shared/storage.js';
  import { renderHTMLPoster, exportHTMLPosterToPDF } from '../src/canvas/html-poster.js';

  const params = new URLSearchParams(window.location.search);
  const validTypes = new Set(['app', 'physical', 'website', 'digital']);
  const rawType = (params.get('type') || '').toLowerCase().trim();
  const productType = validTypes.has(rawType) ? rawType : 'website';

  const project = loadProject() || {};
  const contentValues = project.contentValues || {};
  const titleFont    = project.titleStyle?.fontFamily || 'IBM Plex Sans Hebrew';
  const titleColor   = project.titleStyle?.color      || '#5E2750';
  const textColor    = project.cardStyle?.color       || '#1f1030';
  const background   = project.background             || null;
  const slotImages   = project.slotImages             || {};
  renderHTMLPoster(contentValues, productType, titleFont, titleColor, textColor, background, slotImages);

  if (params.get('print') === '1' && !window.__posterAutoPrintTriggered) {
    window.__posterAutoPrintTriggered = true;
    setTimeout(async () => {
      try {
        await exportHTMLPosterToPDF();
      } catch (err) {
        console.error('PDF export failed:', err);
        alert('לא ניתן לייצא PDF אוטומטית. ניתן ללחוץ על כפתור ייצוא PDF ולנסות שוב.');
      }
    }, 500);
  }

  document.getElementById('btn-back').addEventListener('click', () => {
    const map = { physical: './physical.html', website: './website.html', app: './app.html', digital: './digital.html' };
    window.location.href = map[productType] || './website.html';
  });

  document.getElementById('btn-finish').addEventListener('click', () => {
    window.location.href = '../index.html';
  });

  document.getElementById('btn-export').addEventListener('click', async () => {
    const btn = document.getElementById('btn-export');
    btn.disabled = true;
    btn.textContent = 'מייצא...';
    try {
      await exportHTMLPosterToPDF();
    } catch (err) {
      console.error('PDF export failed:', err);
      alert('שגיאה בייצוא — נסי שנית');
    } finally {
      btn.disabled = false;
      btn.textContent = 'ייצוא PDF';
    }
  });

  function updatePosterScale() {
    const wrapper = document.querySelector('.poster-scale-wrapper');
    const viewportWidth  = window.innerWidth - 20;
    const viewportHeight = window.innerHeight - 130;
    const scale = Math.min(1, viewportWidth / 794, viewportHeight / 1123);
    wrapper?.style.setProperty('--poster-scale', `${Math.max(0.35, scale)}`);
  }
  updatePosterScale();
  window.addEventListener('resize', updatePosterScale);
</script>
</body>
</html>
