<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>בונות פוסטר חקר - מוצר פיזי</title>
    <link rel="stylesheet" href="../src/styles/product-builder.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="../env.js"></script>
    <script>
      window.__POSTER_SPLIT_PRODUCT__ = 'physical';
    </script>
    <script type="module">
      const root = document.getElementById('root');

      function renderFriendlyError(error) {
        const message = error?.message || 'שגיאה לא צפויה בטעינת העמוד.';
        if (!root) return;
        root.innerHTML = `
          <section style="max-width:720px;margin:48px auto;padding:24px;border-radius:16px;background:#fff3f3;border:1px solid #f5b7b7;color:#6b1111;font-family:'IBM Plex Sans Hebrew',Arial,sans-serif;line-height:1.7;">
            <h1 style="margin:0 0 12px;font-size:28px;">לא הצלחנו לטעון את בונה הפוסטר</h1>
            <p style="margin:0 0 12px;">אפשר לרענן את העמוד או לנסות שוב בעוד כמה דקות.</p>
            <pre style="margin:0;white-space:pre-wrap;word-break:break-word;font-size:14px;background:#fff;border-radius:10px;padding:10px;border:1px solid #f1d2d2;">${message}</pre>
          </section>
        `;
      }

      try {
        await import('../src/products/split-flow/main.js');
      } catch (error) {
        console.error('Failed to initialize split-flow main module:', error);
        renderFriendlyError(error);
      }
    </script>
  </body>
</html>
