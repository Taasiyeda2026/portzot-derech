<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מוצר פיזי — פורצות דרך</title>
  <link rel="stylesheet" href="../src/styles/product-builder.css" />
  <style>
    /* ── Layout ─────────────────────────────────────────── */
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f5eef9; font-family: 'IBM Plex Sans Hebrew', sans-serif; color: #1f2937; overflow-x: hidden; }

    .pf-page { display: flex; flex-direction: column; min-height: 100vh; }

    .pf-header {
      background: linear-gradient(135deg, #5e2750 0%, #883a7a 100%);
      padding: 18px 32px 16px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 3px 14px rgba(94,39,80,.35);
      position: sticky; top: 0; z-index: 100;
    }
    .pf-header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #fff; letter-spacing: .02em; }
    .pf-header .pf-header-sub { font-size: .8rem; color: rgba(255,255,255,.75); margin-top: 2px; }

    /* ── Stepper ─────────────────────────────────────────── */
    .pf-stepper {
      display: flex; align-items: center; justify-content: center;
      gap: 0; padding: 14px 24px;
      background: #fff; border-bottom: 2px solid #e8d8f0;
    }
    .pf-step-item { display: flex; align-items: center; }
    .pf-step-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; border-radius: 24px; border: none;
      cursor: pointer; font-family: inherit; font-size: .85rem; font-weight: 600;
      transition: all .18s; white-space: nowrap;
      background: transparent; color: #9b8aac;
    }
    .pf-step-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 700; flex-shrink: 0;
      border: 2px solid currentColor; transition: all .18s;
    }
    .pf-step-btn.locked { cursor: default; opacity: .5; }
    .pf-step-btn.active  { background: #5e2750; color: #fff; }
    .pf-step-btn.active .pf-step-num { background: #fff; color: #5e2750; border-color: #fff; }
    .pf-step-btn.completed { color: #5e2750; }
    .pf-step-btn.completed .pf-step-num { background: #5e2750; color: #fff; border-color: #5e2750; }
    .pf-step-connector {
      width: 32px; height: 2px; background: #d5c4e0; flex-shrink: 0;
      transition: background .18s;
    }
    .pf-step-connector.done { background: #5e2750; }

    /* ── Main content ────────────────────────────────────── */
    .pf-content { flex: 1; padding: 28px 24px 48px; max-width: 860px; margin: 0 auto; width: 100%; }

    .pf-section-title {
      font-size: 1.25rem; font-weight: 700; color: #5e2750;
      margin: 0 0 6px; display: flex; align-items: center; gap: 8px;
    }
    .pf-section-sub { font-size: .88rem; color: #64748b; margin: 0 0 24px; }

    /* ── Field group ─────────────────────────────────────── */
    .pf-field-group { margin-bottom: 20px; }
    .pf-field-label {
      display: block; font-size: .9rem; font-weight: 600; color: #3b1f4e;
      margin-bottom: 5px;
    }
    .pf-field-label .pf-req { color: #b02070; margin-right: 3px; }
    .pf-field-hint { font-size: .8rem; color: #6b7280; margin-bottom: 6px; line-height: 1.45; }
    .pf-field-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .pf-counter { font-size: .76rem; color: #9ca3af; }
    .pf-counter.warn { color: #ef4444; font-weight: 700; }
    .pf-field-error { font-size: .77rem; color: #dc2626; margin-top: 3px; }

    .pf-textarea, .pf-input {
      width: 100%; border: 2px solid #d5c4e0; border-radius: 10px;
      padding: 10px 14px; font-family: inherit; font-size: .92rem;
      color: #1f2937; background: #faf7ff; resize: vertical;
      transition: border .18s, box-shadow .18s; direction: rtl;
      box-sizing: border-box; line-height: 1.55;
    }
    .pf-textarea:focus, .pf-input:focus {
      outline: none; border-color: #8b4fa8; box-shadow: 0 0 0 3px rgba(139,79,168,.15);
      background: #fff;
    }
    .pf-textarea.error, .pf-input.error { border-color: #ef4444; }
    .pf-textarea { min-height: 72px; }

    /* ── List sub-group ──────────────────────────────────── */
    .pf-list-group { border: 2px solid #e8d8f0; border-radius: 12px; padding: 16px 14px 12px; background: #fcf8ff; }
    .pf-list-group-title { font-size: .88rem; font-weight: 700; color: #5e2750; margin: 0 0 12px; }
    .pf-list-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .pf-list-badge {
      width: 26px; height: 26px; border-radius: 50%; background: #5e2750; color: #fff;
      font-size: .78rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 5px;
    }
    .pf-list-item .pf-input { flex: 1; }

    /* ── Chips (single + multi) ──────────────────────────── */
    .pf-chip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 4px; }
    .pf-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 10px; border: 2px solid #d5c4e0;
      background: #faf7ff; cursor: pointer; font-family: inherit;
      font-size: .83rem; font-weight: 500; color: #3b1f4e;
      transition: all .16s; text-align: right; direction: rtl;
      min-height: 42px; user-select: none;
    }
    .pf-chip:hover:not(.disabled) { border-color: #8b4fa8; background: #f3e8ff; }
    .pf-chip.active { border-color: #5e2750; background: #f3e8ff; color: #5e2750; font-weight: 700; }
    .pf-chip.disabled { opacity: .45; cursor: not-allowed; }
    .pf-chip-check {
      width: 18px; height: 18px; border-radius: 4px; border: 2px solid #cbb8d8;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: .7rem; transition: all .15s;
    }
    .pf-chip.active .pf-chip-check { background: #5e2750; border-color: #5e2750; color: #fff; }
    .pf-chip-label { flex: 1; }

    .pf-other-input { margin-top: 10px; }

    /* ── Cards (step 2) ──────────────────────────────────── */
    .pf-card {
      border: 2px solid #d5c4e0; border-radius: 18px; padding: 24px 24px 20px;
      background: #fff; margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(94,39,80,.08);
    }
    .pf-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .pf-card-icon {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg,#5e2750,#8b4fa8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem; flex-shrink: 0;
    }
    .pf-card-title { font-size: 1.05rem; font-weight: 700; color: #5e2750; margin: 0; }
    .pf-card-sub { font-size: .82rem; color: #64748b; margin: 0 0 20px; padding-right: 54px; }
    .pf-card-field { margin-bottom: 18px; }
    .pf-card-field-label { font-size: .88rem; font-weight: 700; color: #3b1f4e; margin-bottom: 5px; }
    .pf-card-field-label .pf-req { color: #b02070; margin-right: 3px; }
    .pf-multi-hint { font-size: .77rem; color: #6b7280; margin-bottom: 6px; }

    /* ── Separator ───────────────────────────────────────── */
    .pf-sep { border: none; border-top: 2px solid #e8d8f0; margin: 28px 0; }

    /* ── Participants ─────────────────────────────────────── */
    .pf-participants-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Navigation ──────────────────────────────────────── */
    .pf-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 36px; padding-top: 24px; border-top: 2px solid #e8d8f0;
    }
    .pf-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 28px; border-radius: 12px; border: none;
      font-family: inherit; font-size: .93rem; font-weight: 700;
      cursor: pointer; transition: all .18s;
    }
    .pf-btn-primary { background: #5e2750; color: #fff; }
    .pf-btn-primary:hover:not(:disabled) { background: #7a3366; box-shadow: 0 4px 16px rgba(94,39,80,.35); transform: translateY(-1px); }
    .pf-btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .pf-btn-ghost { background: transparent; color: #5e2750; border: 2px solid #d5c4e0; }
    .pf-btn-ghost:hover { border-color: #8b4fa8; background: #f3e8ff; }
    .pf-btn-secondary { background: #f3e8ff; color: #5e2750; border: 2px solid #d5c4e0; }
    .pf-btn-secondary:hover { background: #e9d5f5; }

    /* ── Step 3 — Prompts ────────────────────────────────── */
    .pf-prompt-block { margin-bottom: 28px; }
    .pf-prompt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .pf-prompt-title { font-size: 1rem; font-weight: 700; color: #5e2750; }
    .pf-prompt-text {
      width: 100%; border: 2px solid #d5c4e0; border-radius: 12px;
      padding: 16px; font-family: 'IBM Plex Sans Hebrew', monospace; font-size: .82rem;
      color: #1f2937; background: #faf7ff; resize: vertical;
      direction: ltr; text-align: left; line-height: 1.7;
      min-height: 240px; box-sizing: border-box;
    }
    .pf-copy-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 18px; border-radius: 9px; border: 2px solid #d5c4e0;
      background: #fff; color: #5e2750; font-family: inherit; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .16s;
    }
    .pf-copy-btn:hover { background: #f3e8ff; border-color: #8b4fa8; }
    .pf-copy-btn.copied { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
    .pf-copy-all { margin-top: 12px; display: flex; justify-content: center; }

    /* ── Step 4 — Poster ─────────────────────────────────── */
    .pf-poster-layout { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; }
    .pf-poster-sidebar { display: flex; flex-direction: column; gap: 20px; }
    .pf-sidebar-panel { background: #fff; border: 2px solid #e8d8f0; border-radius: 16px; padding: 18px 16px; }
    .pf-sidebar-panel-title { font-size: .88rem; font-weight: 700; color: #5e2750; margin: 0 0 12px; }

    .pf-bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pf-bg-thumb {
      width: 100%; aspect-ratio: 1; border-radius: 8px;
      object-fit: cover; cursor: pointer; border: 3px solid transparent;
      transition: border-color .16s, transform .14s;
    }
    .pf-bg-thumb:hover { transform: scale(1.04); }
    .pf-bg-thumb.active { border-color: #5e2750; }
    .pf-bg-none {
      width: 100%; aspect-ratio: 1; border-radius: 8px;
      border: 2px dashed #cbb8d8; background: #faf7ff;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; color: #9b8aac; cursor: pointer;
      transition: background .16s;
    }
    .pf-bg-none:hover { background: #f0e5ff; }
    .pf-bg-none.active { border-color: #5e2750; background: #f0e5ff; }

    .pf-slot-upload { margin-bottom: 12px; }
    .pf-slot-label { font-size: .82rem; font-weight: 600; color: #3b1f4e; margin-bottom: 6px; }
    .pf-upload-btn {
      display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 8px 14px; border-radius: 9px; border: 2px dashed #cbb8d8;
      background: #faf7ff; color: #6b7280; font-family: inherit; font-size: .8rem;
      cursor: pointer; transition: all .16s; justify-content: center;
    }
    .pf-upload-btn:hover { border-color: #8b4fa8; color: #5e2750; background: #f3e8ff; }
    .pf-slot-preview { width: 100%; aspect-ratio: 25/21; object-fit: cover; border-radius: 8px; margin-top: 6px; }
    .pf-upload-input { display: none; }

    .pf-canvas-wrap {
      background: #e8d8f0; border-radius: 16px; padding: 16px;
      display: flex; align-items: center; justify-content: center;
      min-height: 300px; overflow: hidden;
    }
    .pf-canvas-wrap canvas { border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.25); display: block; }

    .pf-export-btn {
      width: 100%; padding: 12px; border-radius: 12px; border: none;
      background: linear-gradient(135deg,#5e2750,#883a7a); color: #fff;
      font-family: inherit; font-size: .92rem; font-weight: 700;
      cursor: pointer; transition: all .18s; margin-top: 4px;
    }
    .pf-export-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(94,39,80,.4); }

    /* ── Validation banner ───────────────────────────────── */
    .pf-error-banner {
      background: #fef2f2; border: 2px solid #fca5a5; border-radius: 12px;
      padding: 12px 16px; margin-bottom: 20px; font-size: .86rem; color: #dc2626;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 680px) {
      .pf-poster-layout { grid-template-columns: 1fr; }
      .pf-participants-grid { grid-template-columns: 1fr; }
      .pf-stepper { gap: 0; padding: 10px 8px; overflow-x: auto; }
      .pf-step-btn { padding: 6px 10px; font-size: .78rem; }
      .pf-step-connector { width: 18px; }
      .pf-content { padding: 20px 14px 48px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="../src/products/physical/physical-flow.js"></script>
</body>
</html>
