<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>בונות פוסטר חקר - אפליקציה</title>
    <style>
      :root {
        --bg: #f7f3fa;
        --card: #ffffff;
        --primary: #5e2750;
        --primary-soft: #efe5ed;
        --ok: #166534;
        --ok-soft: #dcfce7;
        --muted: #64748b;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --line: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Rubik", "Heebo", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f4edf8 0%, #f8fafc 100%);
        color: #1e293b;
      }
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 16px 48px;
      }
      h1 { text-align: center; margin: 0 0 18px; color: var(--primary); }
      .stepper {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }
      .step {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 999px;
        padding: 11px 10px;
        text-align: center;
        font-weight: 500;
      }
      .step.active { background: var(--primary); color: #fff; border-color: var(--primary); }
      .step.completed { background: var(--ok-soft); color: var(--ok); border-color: #86efac; }
      .step.locked { opacity: .5; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      }
      .field { display: grid; gap: 6px; margin-bottom: 11px; }
      .field label { font-weight: 600; }
      .field textarea, .field input, .field select {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        resize: vertical;
        min-height: 46px;
        background: #fff;
      }
      .field textarea { min-height: 92px; line-height: 1.45; }
      .meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); }
      .meta .bad { color: var(--danger); }
      .meta .good { color: var(--ok); }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip {
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 6px 11px;
        background: #f8fafc;
        cursor: pointer;
      }
      .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
      .chip:disabled { opacity: .4; cursor: not-allowed; }
      .screen-grid { display: grid; gap: 12px; }
      .nav {
        display: flex; justify-content: space-between; gap: 10px; margin-top: 14px;
      }
      button.btn {
        border: none;
        border-radius: 11px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }
      .btn.primary { background: var(--primary); color: #fff; }
      .btn.secondary { background: #e2e8f0; }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .status-note {
        border-radius: 10px;
        padding: 9px 11px;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .status-note.bad { background: var(--danger-soft); color: var(--danger); }
      .status-note.good { background: var(--ok-soft); color: var(--ok); }
      .prompt-box { border: 1px dashed #cbd5e1; border-radius: 12px; padding: 10px; background: #f8fafc; }
      .prompt-text { white-space: pre-wrap; min-height: 160px; margin: 0 0 8px; font-size: 14px; line-height: 1.5; }
      .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .upload {
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 10px;
        background: #fff;
      }
      .final-link {
        display: inline-block;
        margin-top: 8px;
        text-decoration: none;
        background: var(--primary);
        color: white;
        border-radius: 10px;
        padding: 10px 14px;
      }
      @media (max-width: 860px) {
        .stepper { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <main id="root" class="shell"></main>

    <script type="module">
      import { getPosterFields, FIELD_DEFINITIONS, getVisualSlots } from '../src/products/physical/config.js';
      import { saveProject, loadProject } from '../src/shared/storage.js';

      const root = document.getElementById('root');
      const STEP_LABELS = ['שאלות חקר', 'אבטיפוס', 'תמונות', 'פוסטר'];
      const posterSize = (loadProject()?.posterSize) || 'A4';
      const valueFieldDef = FIELD_DEFINITIONS.find((f) => f.id === 'value');
      const valueRect = getPosterFields(posterSize, 'app').find((f) => f.id === 'value');
      const valueCharsEstimate = Math.max(
        70,
        Math.floor((valueRect.width / (valueFieldDef.fontSize * 0.56)) * (valueRect.height / (valueFieldDef.fontSize * valueFieldDef.lineHeight)))
      );
      const feedbackMax = Math.max(42, Math.floor(valueCharsEstimate * 0.45));
      const improvementsMax = Math.max(42, Math.floor(valueCharsEstimate * 0.4));

      const RESEARCH_FIELDS = [
        { key: 'projectName', label: 'שם המיזם', max: 20 },
        { key: 'shortDescription', label: 'תיאור קצר של המיזם', max: 75 },
        { key: 'problem', label: 'מה הבעיה שזיהיתן?', max: 130 },
        { key: 'audience', label: 'על מי הבעיה משפיעה?', max: 75 },
        { key: 'researchQuestion', label: 'מה הייתה שאלת החקר הטכנולוגית?', max: 90 },
        { key: 'research1', label: 'איזה חקר ביצעתן? 1', max: 42 },
        { key: 'research2', label: 'איזה חקר ביצעתן? 2', max: 42 },
        { key: 'research3', label: 'איזה חקר ביצעתן? 3', max: 42 },
        { key: 'insights', label: 'מה גיליתן בעקבות החקר?', max: 110 },
        { key: 'mustInclude1', label: 'מה היה חשוב שהפתרון יכלול? 1', max: 42 },
        { key: 'mustInclude2', label: 'מה היה חשוב שהפתרון יכלול? 2', max: 42 },
        { key: 'mustInclude3', label: 'מה היה חשוב שהפתרון יכלול? 3', max: 42 },
        { key: 'appDescription', label: 'מהי האפליקציה שפיתחתן?', max: 130 },
        { key: 'usage1', label: 'איך המשתמשת משתמשת באפליקציה? 1', max: 42 },
        { key: 'usage2', label: 'איך המשתמשת משתמשת באפליקציה? 2', max: 42 },
        { key: 'usage3', label: 'איך המשתמשת משתמשת באפליקציה? 3', max: 42 },
        { key: 'coreValue', label: 'מה הערך המרכזי של הפתרון?', max: 110 },
        { key: 'feedbackReceived', label: 'איזה משוב קיבלתן?', max: feedbackMax },
        { key: 'improvementsAfterFeedback', label: 'מה שיפרתן בעקבות המשוב?', max: improvementsMax }
      ];

      const SCREEN_TYPE_OPTIONS = ['מסך בית', 'מסך פתיחה', 'חיפוש', 'פעולה מרכזית', 'פרופיל', 'מעקב', 'תוצאה', 'הרשמה', 'התחברות', 'הגדרות', "צ'אט / הודעות", 'אחר'];
      const REQUIRED_COMPONENTS_OPTIONS = ['כותרת', 'ניווט תחתון', 'כפתור פעולה ראשי', 'כרטיסיות', 'גרף', 'רשימה', 'טופס', 'פרופיל', 'מפה', 'התראות', 'אזור מידע', 'תמונת פתיחה / אילוסטרציה', 'שדות הזנה', 'תוצאות', 'אחר'];
      const KEY_FOCUS_OPTIONS = ['הפעולה המרכזית', 'הכפתור הראשי', 'הנתונים', 'הניווט', 'הפשטות של המסך', 'התוצאה', 'התוכן', 'האזור האישי', 'אחר'];
      const IMAGE_FOCUS_OPTIONS = ['הפעולה המרכזית', 'הכפתור הראשי', 'הניווט', 'הנתונים', 'הפשטות', 'התוצאה', 'העיצוב', 'התוכן', 'אחר'];
      const STYLE_OPTIONS = ['מודרני', 'נקי', 'טכנולוגי', 'ידידותי', 'צעיר', 'מקצועי', 'אסתטי', 'מינימליסטי', 'חם אנושי', 'אחר'];
      const REALISM_OPTIONS = ['UI/UX ריאליסטי', 'מוקאפ מסך ריאליסטי', 'אילוסטרטיבי', 'חצי ריאליסטי', 'אחר'];
      const AVOID_OPTIONS = ['טקסט ארוך מדי', 'עומס', 'אלמנטים לא קשורים', 'יותר מדי צבעים', 'מראה ילדותי', 'עיצוב עמוס', 'לוגואים אמיתיים', 'אחר'];

      const appState = {
        step: 1,
        researchAnswers: Object.fromEntries(RESEARCH_FIELDS.map((f) => [f.key, ''])),
        prototypeAnswers: {
          screen1: { screenType: '', shortName: '', visibleContent: '', userAction: '', requiredComponents: [], keyFocus: [] },
          screen2: { screenType: '', shortName: '', visibleContent: '', userAction: '', requiredComponents: [], keyFocus: [] },
          screen3: { screenType: '', shortName: '', visibleContent: '', userAction: '', requiredComponents: [], keyFocus: [] }
        },
        promptAnswers: {
          image1: { focus: [], viewerMessage: '', style: [], realism: '', colors: '', avoid: [], avoidOther: '' },
          image2: { focus: [], viewerMessage: '', style: [], realism: '', colors: '', avoid: [], avoidOther: '' },
          image3: { focus: [], viewerMessage: '', style: [], realism: '', colors: '', avoid: [], avoidOther: '' }
        },
        derivedPosterSpecs: {
          image1Slot: getVisualSlots(posterSize, 'app')[0] || {},
          image2Slot: getVisualSlots(posterSize, 'app')[1] || {},
          image3Slot: getVisualSlots(posterSize, 'app')[2] || {},
          feedbackSlot: valueRect,
          improvementsSlot: valueRect
        },
        generatedPrompts: { image1: '', image2: '', image3: '' },
        uploadedImages: { visual_1: null, visual_2: null, visual_3: null }
      };

      function readStatus(value, max) {
        if (!value.trim()) return 'חסר';
        if (value.length >= max) return 'מלא';
        return 'תקין';
      }

      function validateStep1() {
        return RESEARCH_FIELDS.every((f) => {
          const val = appState.researchAnswers[f.key] || '';
          return val.trim().length > 0 && val.length <= f.max;
        });
      }

      function validateScreen(screen) {
        return Boolean(screen.screenType)
          && Boolean(screen.visibleContent.trim())
          && Boolean(screen.userAction.trim())
          && screen.requiredComponents.length >= 1
          && screen.requiredComponents.length <= 5
          && screen.keyFocus.length >= 1
          && screen.keyFocus.length <= 3;
      }

      function validateStep2() {
        return validateScreen(appState.prototypeAnswers.screen1)
          && validateScreen(appState.prototypeAnswers.screen2)
          && validateScreen(appState.prototypeAnswers.screen3);
      }

      function validateImage(image) {
        return image.focus.length >= 1
          && image.focus.length <= 3
          && image.viewerMessage.trim().length > 0
          && image.style.length >= 1
          && image.style.length <= 2
          && Boolean(image.realism)
          && image.avoid.length <= 4;
      }

      function validateStep3() {
        return validateImage(appState.promptAnswers.image1)
          && validateImage(appState.promptAnswers.image2)
          && validateImage(appState.promptAnswers.image3);
      }

      function stepValid(step) {
        if (step === 1) return validateStep1();
        if (step === 2) return validateStep2();
        if (step === 3) return validateStep3();
        return true;
      }

      function screenByIndex(index) {
        return appState.prototypeAnswers[`screen${index + 1}`];
      }

      function promptByIndex(index) {
        return appState.promptAnswers[`image${index + 1}`];
      }

      function escapeHtml(value) {
        return (value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
      }

      function buildPrompt(index) {
        const r = appState.researchAnswers;
        const s = screenByIndex(index);
        const p = promptByIndex(index);
        const slot = appState.derivedPosterSpecs[`image${index + 1}Slot`];
        const avoidCombined = [...p.avoid, p.avoidOther.trim()].filter(Boolean).join(', ');
        return [
          'צרי תמונה באיכות גבוהה עבור מסך אפליקציה.',
          `שם המיזם: ${r.projectName}. תיאור קצר: ${r.shortDescription}.`,
          `הבעיה שהמיזם פותר: ${r.problem}. קהל היעד: ${r.audience}.`,
          `תיאור האפליקציה: ${r.appDescription}. הערך המרכזי של הפתרון: ${r.coreValue}.`,
          `סוג המסך: ${s.screenType}${s.shortName ? ` (${s.shortName})` : ''}.`,
          `מה המשתמשת רואה: ${s.visibleContent}. מה המשתמשת עושה: ${s.userAction}.`,
          `רכיבים שחייבים להופיע: ${s.requiredComponents.join(', ')}.`,
          `מה חשוב שיבלוט: ${p.focus.join(', ')}.`,
          `מה חשוב שהצופה תבין: ${p.viewerMessage}.`,
          `סגנון עיצובי: ${p.style.join(', ')}.`,
          `רמת ריאליזם: ${p.realism}.`,
          `צבעים בולטים: ${p.colors || 'בהתאם לשפה העיצובית של המיזם'}.`,
          avoidCombined ? `מה לא לכלול: ${avoidCombined}.` : '',
          `התאימי לקומפוזיציה של פוסטר במידות slot ${slot.width || '?'}x${slot.height || '?'} עם framing נקי ו-safe area לשוליים.`,
          'high quality, clean composition, realistic proportions, no watermark, no text overlay, no logo, poster-friendly composition, mobile-app-friendly composition.',
          'מסך אפליקציה נקי, ברור, אסתטי, חד, מתאים לשילוב בפוסטר, ללא טקסט מיותר וללא עומס חזותי.'
        ].filter(Boolean).join(' ');
      }

      function refreshPrompts() {
        appState.generatedPrompts.image1 = buildPrompt(0);
        appState.generatedPrompts.image2 = buildPrompt(1);
        appState.generatedPrompts.image3 = buildPrompt(2);
      }

      function saveToPosterBuilderState() {
        refreshPrompts();
        const r = appState.researchAnswers;
        const values = {
          projectName: r.projectName,
          description: r.shortDescription,
          problem: r.problem,
          audience: r.audience,
          researchQuestion: r.researchQuestion,
          research_1: r.research1,
          research_2: r.research2,
          research_3: r.research3,
          findings: r.insights,
          requirements_1: r.mustInclude1,
          requirements_2: r.mustInclude2,
          requirements_3: r.mustInclude3,
          solution: r.appDescription,
          howItWorks_1: r.usage1,
          howItWorks_2: r.usage2,
          howItWorks_3: r.usage3,
          value: `${r.coreValue}\nמשוב שקיבלתן: ${r.feedbackReceived}\nמה שיפרתן: ${r.improvementsAfterFeedback}`,
          student1: '', student2: '', student3: '', className: '', schoolName: ''
        };
        const loaded = loadProject() || {};
        saveProject({
          ...loaded,
          productType: 'app',
          posterSize,
          contentValues: values,
          slotImages: {
            ...(loaded.slotImages || {}),
            ...appState.uploadedImages
          }
        });
      }

      function stepperHtml() {
        return `<div class="stepper">${STEP_LABELS.map((label, idx) => {
          const step = idx + 1;
          const status = step < appState.step ? 'completed' : step === appState.step ? 'active' : (stepValid(step - 1) ? '' : 'locked');
          return `<button class="step ${status}" data-jump="${step}" ${step > appState.step && !stepValid(step - 1) ? 'disabled' : ''}>${step}. ${label}</button>`;
        }).join('')}</div>`;
      }

      function researchHtml() {
        return `<section class="card">${RESEARCH_FIELDS.map((f) => {
          const value = appState.researchAnswers[f.key] || '';
          const status = readStatus(value, f.max);
          return `<div class="field">
            <label for="${f.key}">${f.label}</label>
            <textarea id="${f.key}" data-research="${f.key}" maxlength="${f.max}" rows="${f.max <= 42 ? 2 : 3}" placeholder="מלאי כאן"></textarea>
            <div class="meta"><span>${value.length}/${f.max}</span><span class="${status === 'חסר' ? 'bad' : status === 'תקין' ? 'good' : ''}">${status}</span></div>
          </div>`;
        }).join('')}</section>`;
      }

      function chips(group, options, selected, max) {
        return `<div class="chips">${options.map((option) => {
          const active = selected.includes(option);
          const disabled = !active && selected.length >= max;
          return `<button type="button" class="chip ${active ? 'active' : ''}" data-group="${group}" data-value="${option}" ${disabled ? 'disabled' : ''}>${option}</button>`;
        }).join('')}</div>`;
      }

      function prototypeHtml() {
        return `<section class="screen-grid">${[1, 2, 3].map((index) => {
          const screen = appState.prototypeAnswers[`screen${index}`];
          return `<article class="card">
            <h3>מסך ${index}</h3>
            <div class="field"><label>מה סוג המסך?</label><select data-screen="${index}" data-key="screenType"><option value="">בחרי סוג מסך</option>${SCREEN_TYPE_OPTIONS.map((o) => `<option ${screen.screenType === o ? 'selected' : ''}>${o}</option>`).join('')}</select></div>
            <div class="field"><label>שם קצר למסך</label><input data-screen="${index}" data-key="shortName" maxlength="50" value="${escapeHtml(screen.shortName)}" placeholder="מלאי שם קצר למסך" /></div>
            <div class="field"><label>מה המשתמשת רואה במסך?</label><textarea data-screen="${index}" data-key="visibleContent" maxlength="260" placeholder="תארי מה רואים במסך">${escapeHtml(screen.visibleContent)}</textarea></div>
            <div class="field"><label>מה המשתמשת עושה במסך?</label><textarea data-screen="${index}" data-key="userAction" maxlength="260" placeholder="תארי מה המשתמשת עושה">${escapeHtml(screen.userAction)}</textarea></div>
            <div class="field"><label>אילו רכיבים חייבים להופיע?</label>${chips(`components-${index}`, REQUIRED_COMPONENTS_OPTIONS, screen.requiredComponents, 5)}<div class="meta"><span>אפשר לבחור בין 1 ל-5 רכיבים</span><span>${screen.requiredComponents.length}/5</span></div></div>
            <div class="field"><label>מה חשוב שיבלוט?</label>${chips(`focus-${index}`, KEY_FOCUS_OPTIONS, screen.keyFocus, 3)}<div class="meta"><span>אפשר לבחור בין 1 ל-3 מוקדים</span><span>${screen.keyFocus.length}/3</span></div></div>
          </article>`;
        }).join('')}</section>`;
      }

      function imagesHtml() {
        refreshPrompts();
        return `<section class="screen-grid">${[1, 2, 3].map((index) => {
          const p = appState.promptAnswers[`image${index}`];
          const promptText = appState.generatedPrompts[`image${index}`];
          return `<article class="card">
            <h3>תמונה ${index} — מבוססת על מסך ${index}</h3>
            <div class="field"><label>מה חשוב שיבלוט?</label>${chips(`image-focus-${index}`, IMAGE_FOCUS_OPTIONS, p.focus, 3)}<div class="meta"><span>אפשר לבחור בין 1 ל-3</span><span>${p.focus.length}/3</span></div></div>
            <div class="field"><label>מה חשוב שהצופה תבין מהמסך?</label><textarea data-image="${index}" data-key="viewerMessage" maxlength="260" placeholder="מלאי מסר מרכזי">${escapeHtml(p.viewerMessage)}</textarea></div>
            <div class="field"><label>סגנון עיצובי</label>${chips(`image-style-${index}`, STYLE_OPTIONS, p.style, 2)}<div class="meta"><span>אפשר לבחור 1 או 2 סגנונות</span><span>${p.style.length}/2</span></div></div>
            <div class="field"><label>רמת ריאליזם</label><select data-image="${index}" data-key="realism"><option value="">בחרי רמת ריאליזם</option>${REALISM_OPTIONS.map((o) => `<option ${p.realism === o ? 'selected' : ''}>${o}</option>`).join('')}</select></div>
            <div class="field"><label>צבעים בולטים</label><input data-image="${index}" data-key="colors" maxlength="80" value="${escapeHtml(p.colors)}" placeholder="למשל סגול, לבן, טורקיז" /></div>
            <div class="field"><label>מה לא לכלול</label>${chips(`image-avoid-${index}`, AVOID_OPTIONS, p.avoid, 4)}<div class="meta"><span>אפשר לבחור עד 4</span><span>${p.avoid.length}/4</span></div></div>
            ${p.avoid.includes('אחר') ? `<div class="field"><label>מה עוד חשוב שלא יופיע?</label><input data-image="${index}" data-key="avoidOther" maxlength="80" value="${escapeHtml(p.avoidOther)}" placeholder="מלאי מה לא לכלול" /></div>` : ''}
            <div class="prompt-box">
              <div class="field"><label>פרומפט מוכן להעתקה</label><p id="prompt-${index}" class="prompt-text">${escapeHtml(promptText)}</p></div>
              <button class="btn secondary" type="button" data-copy="${index}">העתיקי פרומפט</button>
            </div>
          </article>`;
        }).join('')}
        <article class="card"><button class="btn primary" type="button" data-copy-all>העתיקי את כל הפרומפטים</button></article>
        </section>`;
      }

      function posterHtml() {
        saveToPosterBuilderState();
        return `<section class="card">
          <h3>הכול מוכן לשלב הפוסטר</h3>
          <p>המידע של שאלות החקר, האבטיפוס והתמונות נשמר לבונה הפוסטר הקיימת. כדי שהתמונות יופיעו בפוסטר, העלי כאן את שלוש התמונות שהפקת.</p>
          ${[1, 2, 3].map((idx) => `
            <div class="upload field">
              <label>העלי תמונה ${idx}</label>
              <input type="file" accept="image/*" data-upload="visual_${idx}" />
              <div class="meta"><span>${appState.uploadedImages[`visual_${idx}`] ? 'התמונה נשמרה לפוסטר' : 'עדיין לא העלית תמונה'}</span></div>
            </div>
          `).join('')}
          <a class="final-link" href="./editor.html?type=app" target="_blank" rel="noopener">עברי לבונת הפוסטר</a>
        </section>`;
      }

      function renderBody() {
        if (appState.step === 1) return researchHtml();
        if (appState.step === 2) return prototypeHtml();
        if (appState.step === 3) return imagesHtml();
        return posterHtml();
      }

      function render() {
        const canNext = stepValid(appState.step);
        const note = canNext
          ? '<div class="status-note good">אפשר להמשיך לשלב הבא.</div>'
          : '<div class="status-note bad">לפני ההמשך, השלימי את כל שדות החובה בשלב הנוכחי.</div>';

        root.innerHTML = `
          <h1>אפליקציה</h1>
          ${stepperHtml()}
          ${note}
          ${renderBody()}
          <nav class="nav">
            <button class="btn secondary" data-nav="back" ${appState.step === 1 ? 'disabled' : ''}>חזרי לשלב הקודם</button>
            <button class="btn primary" data-nav="next" ${appState.step === 4 || !canNext ? 'disabled' : ''}>המשיכי לשלב הבא</button>
          </nav>
        `;

        RESEARCH_FIELDS.forEach((f) => {
          const input = root.querySelector(`#${f.key}`);
          if (input) input.value = appState.researchAnswers[f.key] || '';
        });
        wireEvents();
      }

      function toggleChip(list, value, max) {
        const index = list.indexOf(value);
        if (index >= 0) list.splice(index, 1);
        else if (list.length < max) list.push(value);
      }

      function updateImageUploads() {
        const loaded = loadProject() || {};
        saveProject({
          ...loaded,
          productType: 'app',
          posterSize,
          slotImages: { ...(loaded.slotImages || {}), ...appState.uploadedImages }
        });
      }

      function wireEvents() {
        root.querySelectorAll('[data-jump]').forEach((btn) => btn.addEventListener('click', () => {
          const target = Number(btn.dataset.jump);
          if (target <= appState.step || stepValid(target - 1)) {
            appState.step = target;
            render();
          }
        }));

        root.querySelectorAll('[data-research]').forEach((el) => el.addEventListener('input', () => {
          appState.researchAnswers[el.dataset.research] = el.value;
          const meta = el.closest('.field').querySelector('.meta');
          const field = RESEARCH_FIELDS.find((f) => f.key === el.dataset.research);
          const stateText = readStatus(el.value, field.max);
          meta.innerHTML = `<span>${el.value.length}/${field.max}</span><span class="${stateText === 'חסר' ? 'bad' : stateText === 'תקין' ? 'good' : ''}">${stateText}</span>`;
        }));

        root.querySelectorAll('[data-screen]').forEach((el) => el.addEventListener('input', () => {
          const screen = appState.prototypeAnswers[`screen${el.dataset.screen}`];
          screen[el.dataset.key] = el.value;
        }));

        root.querySelectorAll('[data-image]').forEach((el) => el.addEventListener('input', () => {
          const image = appState.promptAnswers[`image${el.dataset.image}`];
          image[el.dataset.key] = el.value;
          refreshPrompts();
          const prompt = root.querySelector(`#prompt-${el.dataset.image}`);
          if (prompt) prompt.textContent = appState.generatedPrompts[`image${el.dataset.image}`];
        }));

        root.querySelectorAll('[data-group]').forEach((chip) => chip.addEventListener('click', () => {
          const group = chip.dataset.group;
          const value = chip.dataset.value;
          if (group.startsWith('components-')) {
            const idx = group.replace('components-', '');
            toggleChip(appState.prototypeAnswers[`screen${idx}`].requiredComponents, value, 5);
          }
          if (group.startsWith('focus-')) {
            const idx = group.replace('focus-', '');
            toggleChip(appState.prototypeAnswers[`screen${idx}`].keyFocus, value, 3);
          }
          if (group.startsWith('image-focus-')) {
            const idx = group.replace('image-focus-', '');
            toggleChip(appState.promptAnswers[`image${idx}`].focus, value, 3);
          }
          if (group.startsWith('image-style-')) {
            const idx = group.replace('image-style-', '');
            toggleChip(appState.promptAnswers[`image${idx}`].style, value, 2);
          }
          if (group.startsWith('image-avoid-')) {
            const idx = group.replace('image-avoid-', '');
            toggleChip(appState.promptAnswers[`image${idx}`].avoid, value, 4);
            if (!appState.promptAnswers[`image${idx}`].avoid.includes('אחר')) appState.promptAnswers[`image${idx}`].avoidOther = '';
          }
          render();
        }));

        root.querySelectorAll('[data-copy]').forEach((btn) => btn.addEventListener('click', async () => {
          const idx = Number(btn.dataset.copy);
          await navigator.clipboard.writeText(appState.generatedPrompts[`image${idx}`]);
          btn.textContent = 'הפרומפט הועתק בהצלחה';
        }));

        const copyAllBtn = root.querySelector('[data-copy-all]');
        if (copyAllBtn) {
          copyAllBtn.addEventListener('click', async () => {
            const text = [1, 2, 3].map((i) => `פרומפט ${i}:\n${appState.generatedPrompts[`image${i}`]}`).join('\n\n');
            await navigator.clipboard.writeText(text);
            copyAllBtn.textContent = 'כל הפרומפטים הועתקו בהצלחה';
          });
        }

        root.querySelectorAll('[data-upload]').forEach((input) => input.addEventListener('change', () => {
          const file = input.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            appState.uploadedImages[input.dataset.upload] = e.target.result;
            updateImageUploads();
            render();
          };
          reader.readAsDataURL(file);
        }));

        root.querySelector('[data-nav="back"]').addEventListener('click', () => {
          if (appState.step > 1) {
            appState.step -= 1;
            render();
          }
        });

        root.querySelector('[data-nav="next"]').addEventListener('click', () => {
          if (!stepValid(appState.step)) return;
          if (appState.step < 4) {
            appState.step += 1;
            render();
          }
        });
      }

      render();
    </script>
  </body>
</html>
