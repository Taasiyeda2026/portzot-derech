<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>בונות פוסטר חקר - אפליקציה</title>
    <style>
      :root {
        --bg: #f7f8fc;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --primary: #6d28d9;
        --primary-soft: #ede9fe;
        --ok: #059669;
        --warn: #dc2626;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Rubik, "Arial", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      .page { max-width: 1220px; margin: 0 auto; padding: 28px 18px 56px; }
      .top h1 { margin: 0; font-size: 2rem; }
      .top p { color: var(--muted); margin: 8px 0 0; }
      .stepper { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; margin: 20px 0 28px; }
      .step {
        background: var(--card); border: 1px solid var(--border); border-radius: 14px;
        padding: 12px; display: flex; gap: 10px; align-items: center;
      }
      .step .dot {
        width: 30px; height: 30px; border-radius: 999px; display: grid; place-items: center;
        font-weight: 700; background: #f3f4f6; color: #374151;
      }
      .step.active { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft) inset; }
      .step.active .dot { background: var(--primary); color: #fff; }
      .step.completed .dot { background: var(--ok); color: #fff; }
      .step.locked { opacity: .65; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
      .grid { display: grid; gap: 12px; }
      .research-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .full { grid-column: 1 / -1; }
      .field { display: grid; gap: 6px; }
      label { font-weight: 600; }
      input[type="text"], textarea, select {
        width: 100%; border: 1px solid #d1d5db; border-radius: 10px; padding: 10px 12px;
        font: inherit; background: #fff;
      }
      textarea { min-height: 84px; resize: vertical; line-height: 1.45; }
      .short textarea { min-height: 68px; }
      .meta { font-size: .84rem; color: var(--muted); display: flex; justify-content: space-between; }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--warn); }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip {
        border: 1px solid #c7d2fe; background: #eef2ff; color: #312e81;
        border-radius: 999px; padding: 7px 12px; cursor: pointer; font: inherit;
      }
      .chip.on { background: #c4b5fd; border-color: #8b5cf6; color: #fff; }
      .cards-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; }
      .section-title { margin: 0 0 14px; font-size: 1.15rem; }
      .screen-card, .image-card { border: 1px solid var(--border); border-radius: 14px; padding: 12px; background: #fcfcff; }
      .actions { display: flex; gap: 10px; justify-content: space-between; margin-top: 20px; }
      .btn {
        border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; font: inherit; font-weight: 600;
      }
      .btn.primary { background: var(--primary); color: #fff; }
      .btn.subtle { background: #eef2ff; color: #4338ca; }
      .btn:disabled { opacity: .45; cursor: not-allowed; }
      .err-block { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; border-radius: 10px; padding: 10px; }
      .prompt-box textarea { min-height: 170px; }
      .poster-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
      .poster-preview {
        min-height: 600px; background: linear-gradient(120deg,#1f1147,#4c1d95);
        border-radius: 16px; padding: 16px; color: white; display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px;
      }
      .poster-box { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.35); border-radius: 12px; padding: 10px; overflow-wrap: anywhere; }
      .poster-images { display: grid; gap: 8px; grid-template-columns: repeat(3,minmax(0,1fr)); }
      .poster-img { border-radius: 8px; background: rgba(255,255,255,.2); min-height: 125px; display: grid; place-items: center; overflow: hidden; }
      .poster-img img { width: 100%; height: 100%; object-fit: cover; }
      .upload { font-size: .86rem; color: var(--muted); }
      @media (max-width: 980px) {
        .research-grid, .cards-3, .poster-layout, .poster-preview { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="app" class="page"></div>
    <script>
      const STORAGE_KEY = 'poster_builder_app_flow_v1';
      const STEPS = ['שאלות חקר', 'אבטיפוס', 'תמונות', 'פוסטר'];

      const referenceRects = [
        { area: 1080 * 440, max: 130 }, { area: 1080 * 330, max: 75 }, { area: 1080 * 330, max: 90 },
        { area: 1080 * 480, max: 110 }, { area: 1040 * 350, max: 130 }, { area: 1040 * 310, max: 110 }
      ];
      const avgDensity = referenceRects.reduce((a, r) => a + (r.max / r.area), 0) / referenceRects.length;
      const feedbackSlot = { width: 1040, height: 260, ratio: '4:1', framing: 'medium text focus', composition: 'box-right' };
      const improvementsSlot = { width: 1040, height: 260, ratio: '4:1', framing: 'medium text focus', composition: 'box-left' };
      const feedbackLimit = Math.max(60, Math.floor(feedbackSlot.width * feedbackSlot.height * avgDensity));
      const improvementsLimit = Math.max(60, Math.floor(improvementsSlot.width * improvementsSlot.height * avgDensity));
      const imageSlotSpec = { ratio: '3:4', framing: 'vertical mobile screen', composition: 'centered mobile-safe', safeArea: '8%' };

      const researchFields = [
        ['projectName','שם המיזם',20], ['shortDescription','תיאור קצר של המיזם',75], ['problem','מה הבעיה שזיהיתן?',130],
        ['audience','על מי הבעיה משפיעה?',75], ['researchQuestion','מה הייתה שאלת החקר הטכנולוגית?',90],
        ['research1','איזה חקר ביצעתן? 1',42], ['research2','איזה חקר ביצעתן? 2',42], ['research3','איזה חקר ביצעתן? 3',42],
        ['insights','מה גיליתן בעקבות החקר?',110], ['mustInclude1','מה היה חשוב שהפתרון יכלול? 1',42], ['mustInclude2','מה היה חשוב שהפתרון יכלול? 2',42],
        ['mustInclude3','מה היה חשוב שהפתרון יכלול? 3',42], ['appDescription','מהי האפליקציה שפיתחתן?',130],
        ['usage1','איך המשתמשת משתמשת באפליקציה? 1',42], ['usage2','איך המשתמשת משתמשת באפליקציה? 2',42], ['usage3','איך המשתמשת משתמשת באפליקציה? 3',42],
        ['coreValue','מה הערך המרכזי של הפתרון?',110], ['feedbackReceived','איזה משוב קיבלתן?',feedbackLimit], ['improvementsAfterFeedback','מה שיפרתן בעקבות המשוב?',improvementsLimit]
      ];

      const screenTypeOptions = ['מסך בית','מסך פתיחה','חיפוש','פעולה מרכזית','פרופיל','מעקב','תוצאה','הרשמה','התחברות','הגדרות','צ\'אט / הודעות','אחר'];
      const requiredComponentsOptions = ['כותרת','ניווט תחתון','כפתור פעולה ראשי','כרטיסיות','גרף','רשימה','טופס','פרופיל','מפה','התראות','אזור מידע','תמונת פתיחה / אילוסטרציה','שדות הזנה','תוצאות','אחר'];
      const keyFocusOptions = ['הפעולה המרכזית','הכפתור הראשי','הנתונים','הניווט','הפשטות של המסך','התוצאה','התוכן','האזור האישי','אחר'];
      const imageFocusOptions = ['הפעולה המרכזית','הכפתור הראשי','הניווט','הנתונים','הפשטות','התוצאה','העיצוב','התוכן','אחר'];
      const styleOptions = ['מודרני','נקי','טכנולוגי','ידידותי','צעיר','מקצועי','אסתטי','מינימליסטי','חם אנושי','אחר'];
      const realismOptions = ['UI/UX ריאליסטי','מוקאפ מסך ריאליסטי','אילוסטרטיבי','חצי ריאליסטי','אחר'];
      const avoidOptions = ['טקסט ארוך מדי','עומס','אלמנטים לא קשורים','יותר מדי צבעים','מראה ילדותי','עיצוב עמוס','לוגואים אמיתיים','אחר'];

      const emptyScreen = () => ({ screenType:'', shortName:'', visibleContent:'', userAction:'', requiredComponents:[], keyFocus:[] });
      const emptyImage = () => ({ focus:[], viewerMessage:'', style:[], realism:'', colors:'', avoid:[], avoidOther:'' });

      const defaultState = {
        currentStep: 0,
        researchAnswers: Object.fromEntries(researchFields.map(([id]) => [id, ''])),
        prototypeAnswers: { screen1: emptyScreen(), screen2: emptyScreen(), screen3: emptyScreen() },
        promptAnswers: { image1: emptyImage(), image2: emptyImage(), image3: emptyImage() },
        derivedPosterSpecs: { image1Slot: imageSlotSpec, image2Slot: imageSlotSpec, image3Slot: imageSlotSpec, feedbackSlot, improvementsSlot },
        generatedPrompts: { image1:'', image2:'', image3:'' },
        posterImages: { image1:'', image2:'', image3:'' },
        errors: []
      };

      let state = loadState();
      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
          if (!saved) return structuredClone(defaultState);
          return { ...structuredClone(defaultState), ...saved, researchAnswers: { ...defaultState.researchAnswers, ...(saved.researchAnswers || {}) } };
        } catch { return structuredClone(defaultState); }
      }
      function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

      function update(path, value) {
        const keys = path.split('.');
        let ref = state;
        while (keys.length > 1) ref = ref[keys.shift()];
        ref[keys[0]] = value;
        if (state.currentStep >= 2) state.generatedPrompts = generatePrompts();
        saveState();
        render();
      }

      function toggleMulti(path, item, max) {
        const arr = get(path);
        const has = arr.includes(item);
        if (has) update(path, arr.filter(v => v !== item));
        else if (arr.length < max) update(path, [...arr, item]);
      }

      function get(path) {
        return path.split('.').reduce((acc, k) => acc[k], state);
      }

      function isStepValid(step) {
        if (step === 0) return researchFields.every(([id]) => (state.researchAnswers[id] || '').trim().length > 0 && (state.researchAnswers[id] || '').length <= researchFields.find(f => f[0]===id)[2]);
        if (step === 1) {
          return [1,2,3].every(i => {
            const s = state.prototypeAnswers[`screen${i}`];
            return s.screenType && s.visibleContent.trim() && s.userAction.trim() && s.requiredComponents.length >= 1 && s.requiredComponents.length <= 5 && s.keyFocus.length >= 1 && s.keyFocus.length <= 3;
          });
        }
        if (step === 2) {
          return [1,2,3].every(i => {
            const p = state.promptAnswers[`image${i}`];
            const avoidOk = p.avoid.length <= 4;
            const otherOk = !p.avoid.includes('אחר') || p.avoidOther.trim();
            return p.focus.length >= 1 && p.focus.length <= 3 && p.viewerMessage.trim() && p.style.length >= 1 && p.style.length <= 2 && p.realism && avoidOk && otherOk;
          });
        }
        return true;
      }

      function generatePromptFor(index) {
        const r = state.researchAnswers;
        const s = state.prototypeAnswers[`screen${index}`];
        const p = state.promptAnswers[`image${index}`];
        const avoid = p.avoid.includes('אחר') ? [...p.avoid.filter(v=>v!=='אחר'), `אחר: ${p.avoidOther}`] : p.avoid;
        return `צרי תמונה באיכות גבוהה למסך אפליקציה. שם המיזם: ${r.projectName}. תיאור קצר: ${r.shortDescription}. הבעיה שהמיזם פותר: ${r.problem}. קהל יעד: ${r.audience}. תיאור האפליקציה: ${r.appDescription}. הערך המרכזי של הפתרון: ${r.coreValue}.\n\nמסך ${index}: סוג המסך ${s.screenType}${s.shortName ? `, שם קצר: ${s.shortName}` : ''}. המשתמשת רואה: ${s.visibleContent}. המשתמשת עושה: ${s.userAction}. רכיבים שחובה להציג: ${s.requiredComponents.join(', ')}.\n\nמה חשוב שיבלוט: ${p.focus.join(', ')}. מה חשוב שהצופה תבין: ${p.viewerMessage}. סגנון עיצובי: ${p.style.join(', ')}. רמת ריאליזם: ${p.realism}.${p.colors ? ` צבעים בולטים: ${p.colors}.` : ''}${avoid.length ? ` מה לא לכלול: ${avoid.join(', ')}.` : ''}\n\nהתאמה ל-slot בפוסטר: יחס ${state.derivedPosterSpecs[`image${index}Slot`].ratio}, framing ${state.derivedPosterSpecs[`image${index}Slot`].framing}, composition ${state.derivedPosterSpecs[`image${index}Slot`].composition}, safe area ${state.derivedPosterSpecs[`image${index}Slot`].safeArea}.\n\nhigh quality, clean composition, realistic proportions, no watermark, no text overlay, no logo, poster-friendly composition, mobile-app-friendly composition. מסך אפליקציה נקי, ברור, אסתטי, חד, מתאים לשילוב בפוסטר, ללא טקסט מיותר וללא עומס חזותי.`;
      }

      function generatePrompts() {
        return { image1: generatePromptFor(1), image2: generatePromptFor(2), image3: generatePromptFor(3) };
      }

      function validateStep() {
        if (isStepValid(state.currentStep)) return [];
        if (state.currentStep === 0) return ['יש להשלים את כל שאלות החקר לפני מעבר לשלב הבא.'];
        if (state.currentStep === 1) return ['יש להשלים את כל שדות החובה בשלושת מסכי האבטיפוס.'];
        return ['יש להשלים את כל שדות החובה של 3 כרטיסי התמונות.'];
      }

      function nav(dir) {
        if (dir > 0 && !isStepValid(state.currentStep)) {
          state.errors = validateStep();
          render();
          return;
        }
        const next = Math.max(0, Math.min(3, state.currentStep + dir));
        state.currentStep = next;
        state.errors = [];
        if (next >= 2) state.generatedPrompts = generatePrompts();
        saveState();
        render();
      }

      function stepClass(i) {
        if (i < state.currentStep) return 'completed';
        if (i === state.currentStep) return 'active';
        return isStepValid(i - 1) ? '' : 'locked';
      }

      function textField(path, label, max, short = false) {
        const val = get(path) || '';
        const good = val.trim().length > 0;
        return `
          <div class="field ${short ? 'short' : ''}">
            <label>${label}</label>
            <textarea maxlength="${max}" data-path="${path}" class="txt">${escapeHtml(val)}</textarea>
            <div class="meta"><span class="status ${good ? 'ok' : 'err'}">${good ? 'מולא בהצלחה' : 'חסר להשלים'}</span><span>${val.length}/${max}</span></div>
          </div>`;
      }

      function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

      function chips(path, options, max, min = 1) {
        const selected = get(path);
        return `<div class="chips" data-path="${path}" data-max="${max}" data-min="${min}">${options.map(o => `<button class="chip ${selected.includes(o) ? 'on' : ''}" data-val="${escapeHtml(o)}" type="button">${o}</button>`).join('')}</div>`;
      }

      function renderStep1() {
        return `<div class="card">
          <h2 class="section-title">שלב 1 — שאלות חקר</h2>
          <div class="grid research-grid">${researchFields.map(([id,label,max]) => `<div class="${max<=42?'':'full'}">${textField(`researchAnswers.${id}`, label, max, max <= 42)}</div>`).join('')}</div>
        </div>`;
      }

      function screenCard(i) {
        const s = state.prototypeAnswers[`screen${i}`];
        return `<div class="screen-card">
          <h3>מסך ${i}</h3>
          <div class="field"><label>מה סוג המסך?</label><select data-path="prototypeAnswers.screen${i}.screenType"><option value="">בחרי סוג מסך</option>${screenTypeOptions.map(o => `<option ${s.screenType===o?'selected':''} value="${escapeHtml(o)}">${o}</option>`).join('')}</select></div>
          <div class="field"><label>שם קצר למסך</label><input type="text" data-path="prototypeAnswers.screen${i}.shortName" value="${escapeHtml(s.shortName)}" placeholder="מלאי שם קצר אם רלוונטי" /></div>
          ${textField(`prototypeAnswers.screen${i}.visibleContent`,'מה המשתמשת רואה במסך?',140)}
          ${textField(`prototypeAnswers.screen${i}.userAction`,'מה המשתמשת עושה במסך?',140)}
          <div class="field"><label>אילו רכיבים חייבים להופיע?</label>${chips(`prototypeAnswers.screen${i}.requiredComponents`, requiredComponentsOptions, 5)}</div>
          <div class="field"><label>מה חשוב שיבלוט?</label>${chips(`prototypeAnswers.screen${i}.keyFocus`, keyFocusOptions, 3)}</div>
        </div>`;
      }

      function renderStep2() {
        return `<div class="card"><h2 class="section-title">שלב 2 — אבטיפוס של 3 מסכים</h2><div class="cards-3">${screenCard(1)}${screenCard(2)}${screenCard(3)}</div></div>`;
      }

      function imageCard(i) {
        const p = state.promptAnswers[`image${i}`];
        return `<div class="image-card">
          <h3>תמונה ${i} — מבוססת על מסך ${i}</h3>
          <div class="field"><label>מה חשוב שיבלוט?</label>${chips(`promptAnswers.image${i}.focus`, imageFocusOptions, 3)}</div>
          ${textField(`promptAnswers.image${i}.viewerMessage`, 'מה חשוב שהצופה תבין מהמסך?', 180)}
          <div class="field"><label>סגנון עיצובי</label>${chips(`promptAnswers.image${i}.style`, styleOptions, 2)}</div>
          <div class="field"><label>רמת ריאליזם</label><select data-path="promptAnswers.image${i}.realism"><option value="">בחרי רמת ריאליזם</option>${realismOptions.map(o => `<option ${p.realism===o?'selected':''} value="${escapeHtml(o)}">${o}</option>`).join('')}</select></div>
          <div class="field"><label>צבעים בולטים</label><input type="text" data-path="promptAnswers.image${i}.colors" value="${escapeHtml(p.colors)}" placeholder="אפשר להשאיר ריק" /></div>
          <div class="field"><label>מה לא לכלול</label>${chips(`promptAnswers.image${i}.avoid`, avoidOptions, 4, 0)}
            ${p.avoid.includes('אחר') ? `<input type="text" data-path="promptAnswers.image${i}.avoidOther" value="${escapeHtml(p.avoidOther)}" placeholder="מלאי מה לא לכלול" />` : ''}
          </div>
        </div>`;
      }

      function promptBox(i) {
        const txt = state.generatedPrompts[`image${i}`] || '';
        return `<div class="prompt-box"><label>פרומפט למסך ${i}</label><textarea readonly>${escapeHtml(txt)}</textarea><button type="button" class="btn subtle copy-one" data-key="image${i}">העתיקי פרומפט</button></div>`;
      }

      function renderStep3() {
        return `<div class="card">
          <h2 class="section-title">שלב 3 — תמונות ופרומפטים</h2>
          <div class="cards-3">${imageCard(1)}${imageCard(2)}${imageCard(3)}</div>
          <hr style="border:none;border-top:1px solid var(--border);margin:16px 0" />
          <div class="grid">${promptBox(1)}${promptBox(2)}${promptBox(3)}</div>
          <button type="button" class="btn primary" id="copy-all">העתיקי את כל הפרומפטים</button>
        </div>`;
      }

      function renderStep4() {
        const r = state.researchAnswers;
        const s = state.prototypeAnswers;
        return `<div class="card">
          <h2 class="section-title">שלב 4 — פוסטר</h2>
          <div class="poster-layout">
            <div class="poster-preview">
              <div class="poster-box"><strong>${escapeHtml(r.projectName || 'שם המיזם')}</strong><br />${escapeHtml(r.shortDescription || 'תיאור קצר של המיזם')}</div>
              <div class="poster-box">${escapeHtml(r.problem || 'מה הבעיה שזיהיתן?')}</div>
              <div class="poster-box">${escapeHtml(r.audience || 'על מי הבעיה משפיעה?')}</div>
              <div class="poster-box">${escapeHtml(r.researchQuestion || 'מה הייתה שאלת החקר הטכנולוגית?')}</div>
              <div class="poster-box">${escapeHtml(r.insights || 'מה גיליתן בעקבות החקר?')}</div>
              <div class="poster-box">${escapeHtml(r.appDescription || 'מהי האפליקציה שפיתחתן?')}</div>
              <div class="poster-box">${escapeHtml(r.coreValue || 'מה הערך המרכזי של הפתרון?')}</div>
              <div class="poster-box">משוב שקיבלתן: ${escapeHtml(r.feedbackReceived || '')}</div>
              <div class="poster-box">שיפור בעקבות משוב: ${escapeHtml(r.improvementsAfterFeedback || '')}</div>
              <div class="poster-box" style="grid-column:1/-1">
                <div class="poster-images">
                  ${[1,2,3].map(i => `<div class="poster-img">${state.posterImages[`image${i}`] ? `<img src="${state.posterImages[`image${i}`]}" alt="תמונה ${i}" />` : `תמונה ${i}`}</div>`).join('')}
                </div>
              </div>
            </div>
            <div class="grid">
              <div class="poster-box" style="color:#111;border-color:#ddd;background:#fff;">
                <strong>מיפוי מסכים לפוסטר</strong><br />
                מסך 1: ${escapeHtml(s.screen1.shortName || s.screen1.visibleContent || 'לא הוזן')}
                <br />מסך 2: ${escapeHtml(s.screen2.shortName || s.screen2.visibleContent || 'לא הוזן')}
                <br />מסך 3: ${escapeHtml(s.screen3.shortName || s.screen3.visibleContent || 'לא הוזן')}
              </div>
              ${[1,2,3].map(i => `<div class="field"><label>העלי תמונה ${i} לפוסטר</label><input type="file" accept="image/*" class="upload-image" data-key="image${i}" /><div class="upload">התמונה נשמרת בתוך ה-state הרציף.</div></div>`).join('')}
              <div class="poster-box" style="color:#111;border-color:#ddd;background:#fff;">
                <strong>מפרט שנגזר אוטומטית</strong><br />
                מגבלת "איזה משוב קיבלתן": ${feedbackLimit} תווים.<br />
                מגבלת "מה שיפרתן בעקבות המשוב": ${improvementsLimit} תווים.<br />
                יחס תמונות מסכים: ${imageSlotSpec.ratio}.
              </div>
            </div>
          </div>
        </div>`;
      }

      function bindEvents(root) {
        root.querySelectorAll('textarea.txt, input[type="text"][data-path], select[data-path]').forEach(el => {
          el.addEventListener('input', e => update(e.target.dataset.path, e.target.value));
          el.addEventListener('change', e => update(e.target.dataset.path, e.target.value));
        });
        root.querySelectorAll('.chips').forEach(box => {
          box.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => toggleMulti(box.dataset.path, chip.dataset.val, Number(box.dataset.max)));
          });
        });
        root.querySelectorAll('.copy-one').forEach(btn => btn.addEventListener('click', async () => {
          await navigator.clipboard.writeText(state.generatedPrompts[btn.dataset.key] || '');
          btn.textContent = 'הפרומפט הועתק';
          setTimeout(() => (btn.textContent = 'העתיקי פרומפט'), 1200);
        }));
        const copyAll = root.querySelector('#copy-all');
        if (copyAll) copyAll.addEventListener('click', async () => {
          const all = ['image1','image2','image3'].map(k => `--- ${k} ---\n${state.generatedPrompts[k]}`).join('\n\n');
          await navigator.clipboard.writeText(all);
          copyAll.textContent = 'כל הפרומפטים הועתקו';
          setTimeout(() => (copyAll.textContent = 'העתיקי את כל הפרומפטים'), 1200);
        });
        root.querySelectorAll('.upload-image').forEach(inp => {
          inp.addEventListener('change', e => {
            const file = e.target.files?.[0];
            if (!file) return;
            const fr = new FileReader();
            fr.onload = () => update(`posterImages.${e.target.dataset.key}`, fr.result);
            fr.readAsDataURL(file);
          });
        });
        root.querySelector('#next')?.addEventListener('click', () => nav(1));
        root.querySelector('#back')?.addEventListener('click', () => nav(-1));
      }

      function render() {
        const root = document.getElementById('app');
        const canGoNext = isStepValid(state.currentStep);
        root.innerHTML = `
          <div class="top"><h1>אפליקציה</h1><p>זרימה רציפה ב-4 שלבים, בלשון נקבה וב-RTL מלא.</p></div>
          <div class="stepper">${STEPS.map((s, i) => `<div class="step ${stepClass(i)}"><div class="dot">${i+1}</div><div>${s}</div></div>`).join('')}</div>
          ${state.errors.length ? `<div class="err-block">${state.errors.join('<br />')}</div>` : ''}
          ${state.currentStep===0 ? renderStep1() : ''}
          ${state.currentStep===1 ? renderStep2() : ''}
          ${state.currentStep===2 ? renderStep3() : ''}
          ${state.currentStep===3 ? renderStep4() : ''}
          <div class="actions">
            <button id="back" class="btn subtle" ${state.currentStep===0 ? 'disabled' : ''}>חזרי שלב</button>
            <button id="next" class="btn primary" ${state.currentStep===3 ? 'disabled' : ''} ${!canGoNext ? 'title="השלימי את השלב לפני מעבר"' : ''}>אפשר להמשיך לשלב הבא</button>
          </div>
        `;
        bindEvents(root);
      }

      render();
    </script>
  </body>
</html>
