<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ממתגות ומבססות</title>
  <link rel="icon" type="image/png" href="../icon/favicon.png">
  <link rel="apple-touch-icon" href="../icon/favicon.png">
  <meta name="theme-color" content="#d61f8c">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --deep-blue: #0f1a3d;
      --blue-2: #18265c;
      --cream: #fff3df;
      --cream-soft: #fff8ed;
      --rose: #c97886;
      --amber: #d89a45;
      --fuchsia: #d61f8c;
      --text: #17204a;
      --muted: #5e5870;
      --border: rgba(216, 154, 69, 0.28);
      --shadow: 0 24px 70px rgba(15, 26, 61, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Rubik", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      direction: rtl;
      text-align: center;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(214, 31, 140, 0.16), transparent 26%),
        radial-gradient(circle at 88% 76%, rgba(216, 154, 69, 0.18), transparent 28%),
        radial-gradient(circle at 50% 0%, rgba(15, 26, 61, 0.10), transparent 30%),
        linear-gradient(135deg, var(--cream-soft), var(--cream));
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 30px;
      background: rgba(255, 248, 237, 0.92);
      border-bottom: 1px solid rgba(216, 154, 69, 0.18);
      box-shadow: 0 2px 18px rgba(15, 26, 61, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .header-logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      box-shadow: 0 6px 16px rgba(214, 31, 140, 0.18);
    }

    .header-logo span {
      font-size: 18px;
      font-weight: 800;
      color: var(--fuchsia);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: linear-gradient(135deg, var(--fuchsia), var(--deep-blue));
      color: white;
      font-size: 14px;
      font-weight: 700;
      border-radius: 20px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(214, 31, 140, 0.28);
    }

    .page-wrapper {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 54px 24px 80px;
    }

    .hero {
      position: relative;
      padding: 56px 42px 48px;
      border: 1px solid var(--border);
      border-radius: 38px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.76), rgba(255, 243, 223, 0.72));
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 30px;
      background-image:
        linear-gradient(90deg, rgba(15, 26, 61, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(15, 26, 61, 0.03) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle, black 20%, transparent 72%);
      z-index: -1;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      left: -90px;
      bottom: -120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(214, 31, 140, 0.20), transparent 68%);
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 8px 18px;
      border-radius: 999px;
      color: var(--deep-blue);
      background: linear-gradient(90deg, rgba(214, 31, 140, 0.11), rgba(216, 154, 69, 0.16));
      border: 1px solid rgba(216, 154, 69, 0.26);
      font-size: 15px;
      font-weight: 700;
    }

    h1 {
      margin-bottom: 18px;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 1.02;
      font-weight: 900;
      color: var(--deep-blue);
      text-shadow: 0 12px 34px rgba(214, 31, 140, 0.13);
    }

    h1 strong {
      color: var(--fuchsia);
      font-weight: 900;
    }

    .lead {
      max-width: 770px;
      margin: 0 auto 30px;
      color: var(--muted);
      font-size: clamp(18px, 2.1vw, 22px);
      line-height: 1.7;
      font-weight: 500;
    }

    .choice-note {
      max-width: 780px;
      margin: 0 auto 24px;
      padding: 0;
      color: var(--fuchsia);
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 20px;
      line-height: 1.55;
      font-weight: 800;
    }

    .choice-note span {
      color: var(--fuchsia);
      font-weight: 900;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin: 10px auto 0;
      width: min(520px, 100%);
    }

    .option-btn {
      display: block;
      width: 100%;
      border: 1px solid rgba(216, 154, 69, 0.28);
      border-radius: 22px;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      background: transparent;
      box-shadow: 0 16px 34px rgba(15, 26, 61, 0.10);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      text-decoration: none;
    }

    .option-btn:hover {
      transform: translateY(-6px);
      border-color: rgba(214, 31, 140, 0.42);
      box-shadow: 0 24px 48px rgba(214, 31, 140, 0.16);
    }

    .option-btn img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 5;
      object-fit: cover;
    }
.footer {
      padding: 24px 16px 34px;
      color: var(--deep-blue);
      font-size: 14px;
      font-weight: 600;
      opacity: 0.72;
    }

    @media (max-width: 820px) {
      .options {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 42px 22px 32px;
      }
    }

    @media (max-width: 600px) {
      .header {
        padding: 12px 16px;
      }

      .header-logo span {
        font-size: 15px;
      }

      .back-btn {
        padding: 7px 14px;
        font-size: 13px;
      }

      .page-wrapper {
        padding: 28px 14px 60px;
      }

      .choice-note {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <a href="../final/final.html" class="header-logo">
      <img src="../icon/favicon.png" alt="פורצות דרך">
      <span>פורצות דרך</span>
    </a>
    <a href="../final/final.html" class="back-btn">→ דף הבית</a>
  </div>

  <div class="page-wrapper">
    <main class="hero">
      <h1>ממתגות <strong>ומבססות</strong></h1>

      <p class="lead">
        אחרי שסיימתן את השלבים הטכנולוגיים, הגיע הזמן לארגן את הכול לתיק מוצר מקצועי.<br>
        כאן מחדדות את המיתוג, מדייקות את המסר ומבססות את הזהות הסופית של המוצר.
      </p>

      <div class="choice-note">
        בחרו מסלול והמשיכו לבניית תיק המוצר:
      </div>

      <section class="options" aria-label="בחירת מסלול תיק מוצר">
        <a class="option-btn" href="product/physical.html" aria-label="מוצר פיזי">
          <img src="btn-prd-poster/phy-btn.png" alt="מוצר פיזי">
        </a>

        <a class="option-btn" href="product/digital.html" aria-label="מוצר דיגיטלי">
          <img src="btn-prd-poster/dig-btn.png" alt="מוצר דיגיטלי">
        </a>

        <a class="option-btn" href="product/app.html" aria-label="מוצר אפליקציה">
          <img src="btn-prd-poster/app-btn.png" alt="מוצר אפליקציה">
        </a>
      </section>
    </main>
  </div>
  <footer class="footer">© 2026 פורצות דרך</footer>
</body>
</html>
