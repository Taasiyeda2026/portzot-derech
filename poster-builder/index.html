<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>בונות פוסטר חקר | פורצות דרך</title>

    <link rel="icon" type="image/png" href="../icon/favicon.png" />
    <link rel="apple-touch-icon" href="../icon/favicon.png" />
    <meta name="theme-color" content="#d61f8c" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./src/styles/app.css" />

    <style>
      :root {
        --deep-blue: #0f1a3d;
        --blue-2: #18265c;
        --cream: #fff3df;
        --cream-soft: #fff8ed;
        --rose: #c97886;
        --amber: #d89a45;
        --fuchsia: #d61f8c;
        --text: #17204a;
        --muted: #5e5870;
        --border: rgba(216, 154, 69, 0.28);
        --shadow: 0 24px 70px rgba(15, 26, 61, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        direction: rtl;
        text-align: center;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 18%, rgba(214, 31, 140, 0.16), transparent 26%),
          radial-gradient(circle at 88% 76%, rgba(216, 154, 69, 0.18), transparent 28%),
          radial-gradient(circle at 50% 0%, rgba(15, 26, 61, 0.10), transparent 30%),
          linear-gradient(135deg, var(--cream-soft), var(--cream));
        overflow-x: hidden;
        font-family: "Rubik", Arial, sans-serif;
      }

      .poster-index-page {
        min-height: 100vh;
      }

      .poster-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 30px;
        background: rgba(255, 248, 237, 0.92);
        border-bottom: 1px solid rgba(216, 154, 69, 0.18);
        box-shadow: 0 2px 18px rgba(15, 26, 61, 0.08);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(14px);
      }

      .poster-header-logo {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .poster-header-logo img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        box-shadow: 0 6px 16px rgba(214, 31, 140, 0.18);
      }

      .poster-header-logo span {
        font-size: 18px;
        font-weight: 800;
        color: var(--fuchsia);
      }

      .poster-back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 18px;
        background: linear-gradient(135deg, var(--fuchsia), var(--deep-blue));
        color: white;
        font-size: 14px;
        font-weight: 700;
        border-radius: 20px;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        white-space: nowrap;
      }

      .poster-back-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(214, 31, 140, 0.28);
      }

      .poster-page-wrapper {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 54px 24px 80px;
      }

      .poster-hero {
        position: relative;
        padding: 56px 42px 48px;
        border: 1px solid var(--border);
        border-radius: 38px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.76), rgba(255, 243, 223, 0.72));
        box-shadow: var(--shadow);
        overflow: hidden;
        isolation: isolate;
      }

      .poster-hero::before {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 30px;
        background-image:
          linear-gradient(90deg, rgba(15, 26, 61, 0.035) 1px, transparent 1px),
          linear-gradient(rgba(15, 26, 61, 0.03) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: radial-gradient(circle, black 20%, transparent 72%);
        z-index: -1;
      }

      .poster-hero::after {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        left: -90px;
        bottom: -120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(214, 31, 140, 0.20), transparent 68%);
        z-index: -1;
      }

      .poster-eyebrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 18px;
        padding: 8px 18px;
        border-radius: 999px;
        color: var(--deep-blue);
        background: linear-gradient(90deg, rgba(214, 31, 140, 0.11), rgba(216, 154, 69, 0.16));
        border: 1px solid rgba(216, 154, 69, 0.26);
        font-size: 15px;
        font-weight: 700;
      }

      .poster-hero h1 {
        margin: 0 0 18px;
        font-size: clamp(42px, 7vw, 76px);
        line-height: 1.02;
        font-weight: 900;
        color: var(--deep-blue);
        text-shadow: 0 12px 34px rgba(214, 31, 140, 0.13);
      }

      .poster-hero h1 strong {
        color: var(--fuchsia);
        font-weight: 900;
      }

      .poster-lead {
        max-width: 770px;
        margin: 0 auto 30px;
        color: var(--muted);
        font-size: clamp(18px, 2.1vw, 22px);
        line-height: 1.7;
        font-weight: 500;
      }

      .poster-choice-note {
        max-width: 780px;
        margin: 0 auto 24px;
        padding: 0;
        color: var(--fuchsia);
        background: transparent;
        border: none;
        box-shadow: none;
        font-size: 20px;
        line-height: 1.55;
        font-weight: 800;
      }

      .poster-options {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
        margin: 10px auto 0;
        width: min(490px, 100%);
      }

      .poster-option-btn {
        display: block;
        width: 100%;
        border: 1px solid rgba(216, 154, 69, 0.28);
        border-radius: 22px;
        padding: 0;
        overflow: hidden;
        cursor: pointer;
        background: transparent;
        box-shadow: 0 16px 34px rgba(15, 26, 61, 0.10);
        transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        text-decoration: none;
      }

      .poster-option-btn:hover {
        transform: translateY(-6px);
        border-color: rgba(214, 31, 140, 0.42);
        box-shadow: 0 24px 48px rgba(214, 31, 140, 0.16);
      }

      .poster-option-btn img {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 5.3;
        object-fit: cover;
      }

      .poster-footer {
        padding: 24px 16px 34px;
        color: var(--deep-blue);
        font-size: 14px;
        font-weight: 600;
        opacity: 0.72;
      }

      #root {
        display: none;
      }

      @media (min-width: 821px) {
        html,
        body {
          height: 100%;
        }

        body {
          height: 100vh;
          overflow: hidden;
        }

        .poster-index-page {
          min-height: 100vh;
          height: 100vh;
          display: flex;
          flex-direction: column;
        }

        .poster-header {
          flex: 0 0 auto;
          padding: 10px 28px;
        }

        .poster-header-logo img {
          width: 34px;
          height: 34px;
        }

        .poster-header-logo span {
          font-size: 16px;
        }

        .poster-back-btn {
          padding: 7px 16px;
          font-size: 13px;
        }

        .poster-page-wrapper {
          flex: 1 1 auto;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 18px 24px;
        }

        .poster-hero {
          width: 100%;
          padding: 26px 34px 24px;
          border-radius: 30px;
        }

        .poster-hero::before {
          inset: 12px;
        }

        .poster-hero h1 {
          margin-bottom: 10px;
          font-size: clamp(36px, 5.2vw, 58px);
        }

        .poster-lead {
          margin-bottom: 14px;
          font-size: clamp(15px, 1.45vw, 18px);
          line-height: 1.45;
        }

        .poster-choice-note {
          margin-bottom: 12px;
          font-size: 18px;
          line-height: 1.3;
        }

        .poster-options {
          width: min(430px, 100%);
          gap: 11px;
          margin-top: 6px;
        }

        .poster-option-btn {
          border-radius: 18px;
          box-shadow: 0 10px 24px rgba(15, 26, 61, 0.09);
        }

        .poster-option-btn img {
          aspect-ratio: 16 / 4.75;
        }

        .poster-footer {
          flex: 0 0 auto;
          padding: 10px 16px 14px;
          font-size: 12px;
        }
      }

      @media (max-width: 820px) {
        .poster-hero {
          padding: 42px 22px 32px;
        }
      }

      @media (max-width: 600px) {
        .poster-header {
          padding: 12px 16px;
        }

        .poster-header-logo span {
          font-size: 15px;
        }

        .poster-back-btn {
          padding: 7px 14px;
          font-size: 13px;
        }

        .poster-page-wrapper {
          padding: 28px 14px 60px;
        }

        .poster-choice-note {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body>
    <div class="poster-index-page">
      <header class="poster-header">
        <a href="../final/final.html" class="poster-header-logo" aria-label="פורצות דרך - דף הבית">
          <img src="../icon/favicon.png" alt="פורצות דרך" />
          <span>פורצות דרך</span>
        </a>
        <a href="../final/final.html" class="poster-back-btn">→ דף הבית</a>
      </header>

      <main class="poster-page-wrapper">
        <section class="poster-hero" aria-labelledby="poster-title">

          <h1 id="poster-title">ממתגות <strong>ומבססות</strong></h1>

          <p class="poster-lead">
            אחרי שסיימתן את השלבים הטכנולוגיים, הגיע הזמן לארגן את הכול לתיק מוצר מקצועי.<br />
            כאן מחדדות את המיתוג, מדייקות את המסר ומבססות את הזהות הסופית של המוצר.
          </p>

          <div class="poster-choice-note">
            בחרו מסלול והמשיכו לבניית תיק המוצר:
          </div>

          <nav class="poster-options" aria-label="בחירת מסלול תיק מוצר">
            <a class="poster-option-btn" href="product/physical.html" aria-label="מוצר פיזי">
              <img src="btn-prd-poster/phy-btn.png" alt="מוצר פיזי" />
            </a>

            <a class="poster-option-btn" href="product/digital.html" aria-label="מוצר דיגיטלי">
              <img src="btn-prd-poster/dig-btn.png" alt="מוצר דיגיטלי" />
            </a>

            <a class="poster-option-btn" href="product/app.html" aria-label="מוצר אפליקציה">
              <img src="btn-prd-poster/app-btn.png" alt="מוצר אפליקציה" />
            </a>
          </nav>
        </section>
      </main>

      <footer class="poster-footer">© 2026 פורצות דרך</footer>
    </div>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
