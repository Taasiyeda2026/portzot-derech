<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>בונות פוסטר חקר | פורצות דרך</title>
    <link rel="icon" type="image/png" href="../icon/favicon.png" />
    <link rel="apple-touch-icon" href="../icon/favicon.png" />
    <meta name="theme-color" content="#d61f8c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles/gateway.css" />
  <style>
    </style>
  </head>

  <body>
    <div class="poster-index-page">
      <header class="poster-header">
        <a href="../strongermenu-2026.html" class="poster-header-logo" aria-label="פורצות דרך - דף הבית">
          <img src="../icon/favicon.png" alt="פורצות דרך" />
          <span>פורצות דרך</span>
        </a>
        <a href="../strongermenu-2026.html" class="poster-back-btn">→ דף הבית</a>
      </header>

      <main class="poster-page-wrapper">
        <section class="poster-hero" aria-labelledby="poster-title">
          <h1 id="poster-title">ממתגות <strong>ומבססות</strong></h1>

          <p class="poster-lead">
            אחרי שסיימתן את השלבים הטכנולוגיים, הגיע הזמן לארגן את הכול לתיק מוצר מקצועי.<br />
            כאן מחדדות את המיתוג, מדייקות את המסר ומבססות את הזהות הסופית של המוצר.
          </p>

          <div class="poster-choice-note">
            בחרו את סוג המוצר והמשיכו לבניית תיק המוצר:
          </div>

          <nav class="poster-options" aria-label="בחירת סוג מוצר">
            <a class="poster-option-btn" href="product/physical.html" aria-label="מוצר פיזי" data-product-link="physical">
              <img src="btn-prd-poster/phy-btn.png" alt="מוצר פיזי" />
            </a>

            <a class="poster-option-btn" href="product/website.html" aria-label="אתר" data-product-link="website">
              <img src="btn-prd-poster/dig-btn.png" alt="אתר" />
            </a>

            <a class="poster-option-btn" href="product/app.html" aria-label="אפליקציה" data-product-link="app">
              <img src="btn-prd-poster/app-btn.png" alt="אפליקציה" />
            </a>
          </nav>
        </section>
      </main>

      <footer class="poster-footer">© 2026 פורצות דרך</footer>
    </div>
    <script type="module">
    import { resolveSchoolConfig } from './src/shared/poster-schools.js';
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const requestedSchool = params.get('school') || 'default';
      const shouldStartFresh = params.get('fresh') === '1' || params.get('start') === '1';
      const groupCode = params.get('group') || '';
      const config = await resolveSchoolConfig(requestedSchool);
      const activeSlug = config.slug || 'default';
      document.querySelectorAll('[data-product-link]').forEach((link) => {
        const url = new URL(link.getAttribute('href'), window.location.href);
        if (activeSlug !== 'default') url.searchParams.set('school', activeSlug);
        if (shouldStartFresh) url.searchParams.set('fresh', '1');
        if (groupCode) url.searchParams.set('group', groupCode);
        link.href = url.pathname.split('/poster-builder/')[1] + url.search;
      });
    })();
    (function () {
      var title = document.getElementById('poster-title');
      if (!title) return;
      var clicks = 0;
      var timer = null;
      title.style.cursor = 'default';
      title.addEventListener('click', function () {
        clicks += 1;
        window.clearTimeout(timer);
        if (clicks >= 3) {
          window.location.href = './admin.html';
          return;
        }
        timer = window.setTimeout(function () { clicks = 0; }, 900);
      });
    })();
  </script>
</body>
</html>
