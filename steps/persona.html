<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>פורצות דרך – בניית פרסונה</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&family=Assistant:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/print.css" media="print">

<style>
body {
    font-family: 'Assistant', sans-serif;
    direction: rtl;
    margin: 0;
    background: #f3f4f6;
    padding: 20px;
}

#formArea {
    max-width: 850px;
    margin: 0 auto;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1 { color: #e91e63; font-family: 'Rubik'; text-align: center; }
h2 { color: #00a7b5; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 30px; }

label { display: block; font-weight: 600; margin-bottom: 8px; margin-top: 15px; }

input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
    resize: vertical;
}

.checkbox-list {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    margin-top: 5px;
}

.checkbox-list label {
    font-weight: normal;
    display: block;
    cursor: pointer;
    margin: 5px 0;
}

button {
    background: linear-gradient(90deg, #e91e63, #00a7b5);
    color: white;
    border: none;
    padding: 18px;
    font-size: 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    width: 100%;
    margin-top: 30px;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div id="formArea">
<h1>בניית פרסונה – פורצות דרך 🎀</h1>

<div style="background: #fff0f5; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
<label>שמות חברות הצוות:</label>
<input type="text" id="teamNames" placeholder="רשמו את שמות חברות הצוות">
</div>

<h2>חלק א' – מי היא?</h2>
<div style="display:flex; gap:10px;">
<div style="flex:2;">
<label>שם הפרסונה:</label>
<input type="text" id="name" placeholder="לדוגמה: נועה">
</div>
<div style="flex:1;">
<label>גיל:</label>
<input type="text" id="age" placeholder="16">
</div>
</div>

<label>מה מאפיין את שגרת החיים שלה?</label>
<div class="checkbox-list">
<label><input type="checkbox" class="routine" value="תלמידה שמתמקדת בעיקר בלימודים"> תלמידה שמתמקדת בעיקר בלימודים</label>
<label><input type="checkbox" class="routine" value="משלבת לימודים עם חוגים / אימונים"> משלבת לימודים עם חוגים / אימונים</label>
<label><input type="checkbox" class="routine" value="פעילה בתנועת נוער / מסגרת חברתית"> פעילה בתנועת נוער / מסגרת חברתית</label>
<label><input type="checkbox" class="routine" value="עובדת אחרי שעות הלימודים"> עובדת אחרי שעות הלימודים</label>
<label><input type="checkbox" class="routine" value="לוקחת אחריות בבית (אחים / מטלות קבועות)"> לוקחת אחריות בבית (אחים / מטלות קבועות)</label>
<div style="display:flex; align-items:center; gap:5px; margin-top:5px;">
<span>אחר:</span>
<input type="text" id="routineOther" style="margin:0; height:30px;">
</div>
</div>

<label>כך נראית השגרה שלה בקצרה:</label>
<textarea id="routineText" placeholder="תארו את היום שלה..."></textarea>

<h2>חלק ב' – הסיטואציה שבה מופיעה הבעיה</h2>
<label>איפה היא נמצאת רוב היום?</label>
<div class="checkbox-list">
<label><input type="checkbox" class="location" value="בבית הספר"> בבית הספר</label>
<label><input type="checkbox" class="location" value="בבית"> בבית</label>
<label><input type="checkbox" class="location" value="בתחבורה ציבורית"> בתחבורה ציבורית</label>
<label><input type="checkbox" class="location" value="באימון / חוג"> באימון / חוג</label>
<label><input type="checkbox" class="location" value="עם חברים"> עם חברים</label>
<div style="display:flex; align-items:center; gap:5px; margin-top:5px;">
<span>אחר:</span>
<input type="text" id="locationOther" style="margin:0; height:30px;">
</div>
</div>

<label>מתי הבעיה מופיעה? (זמן + מקום + מצב)</label>
<textarea id="moment" placeholder="לדוגמה: כל בוקר בדרך לבית הספר..."></textarea>

<label>מה קורה בפועל באותו רגע? (תיאור התנהגותי)</label>
<textarea id="action" placeholder="תארו מה קורה..."></textarea>

<h2>חלק ג' – עומק רגשי ותפקודי</h2>
<label>מה היא מרגישה בסיטואציה הזו?</label>
<textarea id="emotion" placeholder="לדוגמה: מתוסכלת, מבוישת..."></textarea>

<label>איך זה משפיע עליה?</label>
<div class="checkbox-list" style="display:flex; flex-wrap:wrap; gap:15px;">
<label><input type="checkbox" class="impactType" value="לימודית"> לימודית</label>
<label><input type="checkbox" class="impactType" value="חברתית"> חברתית</label>
<label><input type="checkbox" class="impactType" value="רגשית"> רגשית</label>
<label><input type="checkbox" class="impactType" value="ניהול זמן"> ניהול זמן</label>
<div style="display:flex; align-items:center; gap:5px;">
<span>אחר:</span>
<input type="text" id="impactOther" style="margin:0; width:150px; height:30px;">
</div>
</div>

<label>הסבר קצר על ההשפעה:</label>
<textarea id="impactText" placeholder="הסבירו כיצד הבעיה משפיעה..."></textarea>

<h2>חלק ד' – ניסוח יזמי מדויק</h2>
<label>ציטוט שמייצג אותה:</label>
<input type="text" id="quote" placeholder='"אני תמיד מאחרת..."'>

<label>משפט הבעיה:</label>
<div style="background:#f0f0f0; padding:15px; border-radius:8px;">
נערות בגיל <input type="text" id="pAge" style="width:50px; margin:0;" placeholder="16"> אשר <input type="text" id="pWho" style="width:200px; margin:0;" placeholder="לומדות בתיכון"> <br><br>
מתקשות ב-<input type="text" id="pDifficulty" style="width:200px; margin:0;" placeholder="ניהול זמן"> כאשר <input type="text" id="pWhen" style="width:200px; margin:0;" placeholder="משלבות פעילויות רבות">.
</div>

<button onclick="generatePDF()">🎀 הורדת PDF</button>
</div>

<script>
function getValues(className, otherId) {
    let vals = Array.from(document.querySelectorAll('.' + className + ':checked')).map(cb => cb.value);
    let other = document.getElementById(otherId).value.trim();
    if (other) vals.push(other);
    return vals.length > 0 ? vals.join(', ') : 'לא צוין';
}

function generatePDF() {
    const team = document.getElementById('teamNames').value.trim() || 'לא צוין';
    const name = document.getElementById('name').value.trim() || 'לא צוין';
    const age = document.getElementById('age').value.trim() || 'לא צוין';
    const routine = getValues('routine', 'routineOther');
    const routineText = document.getElementById('routineText').value.trim() || 'לא צוין';
    const location = getValues('location', 'locationOther');
    const moment = document.getElementById('moment').value.trim() || 'לא צוין';
    const action = document.getElementById('action').value.trim() || 'לא צוין';
    const emotion = document.getElementById('emotion').value.trim() || 'לא צוין';
    const impactType = getValues('impactType', 'impactOther');
    const impactText = document.getElementById('impactText').value.trim() || 'לא צוין';
    const quote = document.getElementById('quote').value.trim() || 'לא צוין';

    const pAge = document.getElementById('pAge').value.trim() || '___';
    const pWho = document.getElementById('pWho').value.trim() || '___';
    const pDifficulty = document.getElementById('pDifficulty').value.trim() || '___';
    const pWhen = document.getElementById('pWhen').value.trim() || '___';

    const problemSentence = `נערות בגיל ${pAge} אשר ${pWho} מתקשות ב-${pDifficulty} כאשר ${pWhen}.`;
    const origin = location.origin || window.location.origin;

    const html = `<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>פרסונה – ${name}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Assistant', Arial, sans-serif; direction: rtl; color: #1f2937; font-size: 14px; line-height: 1.55; padding: 28px 32px; background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  h1 { font-size: 22px; font-weight: 800; color: #1e3a8a; margin-bottom: 4px; }
  h2 { font-size: 16px; font-weight: 700; color: #c026d3; }
  .header { background: linear-gradient(135deg,#fbcfe8,#f5d0fe 45%,#bae6fd); border: 1px solid #d8b4fe; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .brand { font-size: 22px; font-weight: 800; color: #1e3a8a; }
  .brand-sub { font-size: 13px; font-weight: 700; color: #c026d3; }
  .meta { background: rgba(255,255,255,.85); border: 1px solid #f9a8d4; border-radius: 8px; padding: 8px 10px; color: #334155; font-size: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .title-box { border: 1px solid #fbcfe8; border-right: 5px solid #ec4899; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
  .info-box { border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .blue { background: #e0f2fe; border: 1px solid #cbd5e1; border-right: 4px solid #38bdf8; }
  .pink { background: #fdf4ff; border: 1px solid #cbd5e1; border-right: 4px solid #c026d3; }
  .gray { background: #f8fafc; border: 1.5px solid #94a3b8; min-height: 60px; }
  .orange { background: #ffedd5; border: 1px solid #fdba74; border-right: 4px solid #fb923c; }
  .box-title { color: #ec4899; font-weight: 700; margin-bottom: 6px; }
  .footer { text-align: center; color: #64748b; font-size: 11px; margin-top: 16px; padding-top: 8px; border-top: 1px solid #e2e8f0; }
  @media print { body { padding: 18px 24px; } }
</style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div><div class="brand">פורצות דרך</div><div class="brand-sub">פרסונה — דף עבודה</div></div>
    </div>
    <div class="meta">
      <div><strong>משתתפות:</strong> ${team}</div>
      <div><strong>קבוצה:</strong> ____________________</div>
      <div><strong>תאריך:</strong> ____________________</div>
    </div>
  </div>

  <div class="title-box">
    <h1>הגדרת פרסונה</h1>
    <h2>${name} | גיל: ${age}</h2>
  </div>

  <div class="info-box blue">
    <strong style="color:#1e3a8a;">הסבר:</strong> מחדדות מי המשתמשת שלנו, מה הקושי שלה, ומה המשפט היזמי המדויק שמכוון לפתרון.
  </div>

  <div class="info-box pink">
    <div class="box-title">שגרה ואתגר</div>
    <p><strong>שגרת חיים:</strong> ${routine}</p>
    <p style="margin-top:4px;">${routineText}</p>
  </div>

  <div class="info-box pink">
    <div class="box-title">הקשר הבעיה</div>
    <p><strong>מיקומים:</strong> ${location}</p>
    <p style="margin-top:4px;"><strong>מתי:</strong> ${moment}</p>
    <p style="margin-top:4px;"><strong>מה קורה בפועל:</strong> ${action}</p>
  </div>

  <div class="info-box gray">
    <div class="box-title">תשובה קצרה</div>
    <p><strong>רגש:</strong> ${emotion} | <strong>השפעה:</strong> ${impactType}</p>
  </div>

  <div class="info-box gray">
    <div class="box-title">תשובה ארוכה</div>
    <p>${impactText}</p>
    <p style="margin-top:6px;font-style:italic;">"${quote}"</p>
  </div>

  <div class="info-box orange">
    <strong style="color:#1e3a8a;">מסר חשוב:</strong> ${problemSentence}
  </div>

  <div class="footer">© 2026 פורצות דרך</div>
</body>
</html>`;

    const win = window.open('', '_blank');
    if (!win) { alert('אנא אפשר חלונות קופצים בדפדפן ונסי שוב.'); return; }
    win.document.write(html);
    win.document.close();
    win.onload = () => { win.focus(); win.print(); };
}
</script>

</body>
</html>
