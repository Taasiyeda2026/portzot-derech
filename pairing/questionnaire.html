const stepLabel = document.getElementById('stepLabel');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const backBtn = document.getElementById('backBtn');
const nextBtn = document.getElementById('nextBtn');

function renderQuestion() {
  const q = questions[step];
  eyebrowEl.textContent = q.eyebrow;
  questionText.textContent = q.text;
  stepLabel.textContent = 'שאלה ' + (step + 1) + ' מתוך ' + questions.length;
  const progress = Math.round(((step + 1) / questions.length) * 100);
  progressText.textContent = progress + '%';
  progressFill.style.width = progress + '%';
  hint.textContent = '';
  backBtn.disabled = step === 0;
  nextBtn.textContent = step === questions.length - 1 ? 'סיימתי — אפשר להמשיך 💜' : 'קדימה';

  if (!q.options.length) {
    textAnswer.style.display = 'block';
    optionsEl.style.display = 'none';
    textAnswer.value = answers[q.field] || '';
    textAnswer.focus();
    return;
  }

  textAnswer.style.display = 'none';
  optionsEl.style.display = 'grid';
  optionsEl.innerHTML = '';
  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'option-btn' + (answers[q.field] === opt.label ? ' active' : '');
    btn.textContent = opt.label;
    btn.dataset.label = opt.label;
    btn.dataset.code = opt.code;
    optionsEl.appendChild(btn);
  });
}

optionsEl.addEventListener('click', function(e) {
  var btn = e.target.closest('.option-btn');
  if (!btn) return;
  var q = questions[step];
  answers[q.field] = btn.dataset.label;
  codes[q.field] = btn.dataset.code;
  renderQuestion();
});

backBtn.addEventListener('click', function() {
  if (step > 0) { step--; renderQuestion(); }
});

nextBtn.addEventListener('click', async function() {
  var q = questions[step];
  if (q.field === 'displayName') {
    var v = textAnswer.value.trim();
    if (!v) { hint.textContent = 'רגע, צריך לבחור משהו לפני שממשיכות 🙂'; return; }
    answers[q.field] = v;
  }
  if (!answers[q.field]) { hint.textContent = 'רגע, צריך לבחור משהו לפני שממשיכות 🙂'; return; }
  if (step < questions.length - 1) { step++; renderQuestion(); return; }

  var p = { id: crypto.randomUUID(), sessionId: sessionId, submittedAt: new Date().toISOString() };
  for (var i = 0; i < questions.length; i++) {
    var field = questions[i].field;
    p[field] = answers[field];
    if (field !== 'displayName') p[field + 'Code'] = codes[field] || answers[field];
  }
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('savingMessage').style.display = 'block';
  await setDoc(doc(db, 'responses', p.id), p);
  await updateDoc(doc(db, 'sessions', sessionId), { completedCount: increment(1) });
  localStorage.setItem('displayName', p.displayName);
  localStorage.setItem('responseId', p.id);
  setTimeout(function() { location.href = 'waiting.html?session=' + sessionId; }, 700);
});

renderQuestion();
</script>
</body>
</html>
