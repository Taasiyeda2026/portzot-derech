<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>שאלון קבוצות עבודה - פורצות דרך</title></head><body>
<div><h1>🌟 שאלון לקבוצות עבודה 🌟</h1><p>לפני שמתחילות לעבוד בקבוצות, נכיר קצת את הדרך שבה את חושבת, בוחרת, מתארגנת ועובדת עם אחרות.<br>זה שאלון קצר וקליל — אין בו תשובות נכונות או לא נכונות. בחרי את מה שהכי דומה לך ביומיום.<br>התשובות יעזרו ליצור קבוצות עבודה נעימות, מאוזנות ומתאימות יותר לתהליך.</p></div>
<form id="q"></form><button id="submit">סיימתי - מוכנה לקבוצה</button>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, setDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const cfg={apiKey:"AIzaSyCFSq5b-HgkTxFNhBJIBdOe2ian5TZvMPE",authDomain:"portzot-derech.firebaseapp.com",projectId:"portzot-derech",storageBucket:"portzot-derech.firebasestorage.app",messagingSenderId:"236417614890",appId:"1:236417614890:web:587b0eb3c5eedfa352af53"};
const db=getFirestore(initializeApp(cfg)); const sessionId=new URLSearchParams(location.search).get('session'); if(!sessionId) location.href='pairing.html';
const maps={
infoProcessingStyle:{'קוראת הכול מהתחלה כדי להבין':'thorough_reader','שואלת ישר “אז מה הוחלט?”':'decision_focused','מחפשת את ההודעה הכי חשובה':'key_info_finder','מחכה שמישהי תסכם':'summary_dependent','שולחת הודעה שמסדרת את הדברים':'organizer','מתעלמת עד שזה באמת חשוב':'selective_attention'},
planningStyle:{'הכול כבר מוכן מראש':'planner','אני מתארגנת מהר ומסתדרת תוך כדי':'quick_executor','אני מתחילה ואז נזכרת בעוד דברים':'improviser','אני צריכה רשימה כדי לא לשכוח':'checklist_oriented','אני בודקת עם חברה מה צריך להביא':'collaborative_planner','אני זורמת, העיקר לצאת בזמן':'flexible'}
};
const questions=[['displayName','איך תרצי שנכתוב את השם שלך?',[]],['mainDomain','איזה תחום הכי מסקרן אותך לעבוד עליו?',['חיים דיגיטליים וטכנולוגיה ביום־יום','למידה, לחץ והתארגנות','חיים חברתיים ותקשורת בין אנשים','סביבה, טבע ובעלי חיים','בחירות יומיומיות והרגלים','פנאי, יצירה ותחביבים','גוף, בריאות ותחושת ביטחון','בית, משפחה וסביבה קרובה','מרחב, תנועה ובטיחות','מבט קדימה ורעיונות לעתיד']],['problemType','איזה סוג של בעיה הכי מעניין אותך לחקור?',['בעיה שמפריעה ביום־יום','בעיה חברתית בין אנשים','בעיה שקשורה ללמידה או לבית הספר','בעיה שקשורה לבטיחות','בעיה שקשורה לסביבה או לבעלי חיים','בעיה שקשורה לנוחות, זמן או סדר','בעיה שקשורה לתקשורת או חוסר הבנה','בעיה שקשורה לביטחון עצמי או תחושת מסוגלות']],['infoProcessingStyle','כשיש בקבוצת וואטסאפ מלא הודעות ואת לא מבינה מה נסגר, מה את עושה?',['קוראת הכול מהתחלה כדי להבין','שואלת ישר “אז מה הוחלט?”','מחפשת את ההודעה הכי חשובה','מחכה שמישהי תסכם','שולחת הודעה שמסדרת את הדברים','מתעלמת עד שזה באמת חשוב']],['planningStyle','את צריכה לצאת מהבית עוד 20 דקות. מה הכי דומה לך?',['הכול כבר מוכן מראש','אני מתארגנת מהר ומסתדרת תוך כדי','אני מתחילה ואז נזכרת בעוד דברים','אני צריכה רשימה כדי לא לשכוח','אני בודקת עם חברה מה צריך להביא','אני זורמת, העיקר לצאת בזמן']],['choiceDriver','כשאת בוחרת סדרה או סרט לראות, מה הכי משפיע עלייך?',['המלצה של חברה','הטריילר או איך שזה נראה','הסיפור והרעיון','הדמויות','מה שכולם מדברים עליו','אני בודקת ביקורות לפני']],['naturalTeamContribution','כשמתכננים יום הולדת לחברה, איזה חלק הכי מתאים לך לקחת?',['להעלות רעיונות לקונספט','לארגן מי מביאה מה','לעצב הזמנה או תמונה','לדאוג שלא שכחו אף אחת','להכין פעילות או משחק','להציג, לברך או להוביל את הרגע','להיות זו שעוזרת מאחורי הקלעים']],['problemSolvingStyle','אם משהו בטלפון לא עובד, מה את עושה בדרך כלל?',['מנסה לבד עד שזה מסתדר','מחפשת בגוגל או בטיקטוק פתרון','שואלת מישהי שמבינה','סוגרת ופותחת מחדש','מתעצבנת ועוזבת את זה רגע','בודקת בהגדרות מה השתנה']],['visualCommunicationStyle','כשאת מעלה סטורי או תמונה, מה הכי חשוב לך?',['שזה ייראה יפה','שזה יעביר בדיוק את התחושה','שזה יהיה מצחיק או מקורי','שזה יהיה ברור ולא עמוס','שזה יתאים למה שאני רוצה להגיד','אני לא משקיעה בזה יותר מדי']],['groupBehaviorPattern','כשיש עבודה בקבוצה, מה בדרך כלל קורה לך?',['אני מנסה להבין מה כולן רוצות לעשות','אני מציעה רעיון להתחלה','אני שואלת מי עושה מה','אני מחכה לראות איפה צריך אותי','אני לוקחת חלק אחד ועושה אותו טוב','אני עוזרת לחבר בין כולן']],['conflictStyle','כשיש דעות שונות בקבוצה, מה בדרך כלל עוזר לך?',['לדבר ולמצוא פשרה','להצביע ולקבל החלטה','לבדוק מה הכי מתאים למטרה','לתת לכל אחת להסביר את עצמה','לבקש עזרה מהמדריכה','לקחת רגע לחשוב ואז לחזור לשיחה']],['groupNeed','מה הכי חשוב לך להרגיש בקבוצה?',['שיש מקום לרעיונות שלי','שיש סדר ובהירות','שאפשר לשאול בלי להתבייש','שכולן משתתפות','שמתקדמים ולא נתקעים','שיש אווירה נעימה','שאני יודעת מה התפקיד שלי']],['groupComfortLevel','עד כמה את מרגישה נוח להשתלב בקבוצה חדשה?',['ממש נוח לי','די נוח לי','לוקח לי רגע, אבל אני משתלבת','אני צריכה שמישהי תעזור לי להיכנס','תלוי בקבוצה']],['neededTeamSupport','איזו חברה הכי עוזרת לך לעבוד טוב?',['מישהי שמארגנת ומסדרת','מישהי שמעלה רעיונות','מישהי שמרגיעה כשיש לחץ','מישהי שמובילה החלטות','מישהי שטובה בהצגה','מישהי שטובה בביצוע ובנייה','מישהי שמקשיבה ועוזרת לכולן להשתלב']],['startStyle','מה הכי מתאים לך כשצריך להתחיל משהו חדש?',['להתחיל מהר ולשפר תוך כדי','להבין קודם מה המטרה','לראות דוגמה ואז לנסות','לדבר עם הקבוצה ולבנות כיוון','לחלק משימות ולהתחיל לעבוד','לחפש רעיונות לפני שמחליטים']]];
const f=document.getElementById('q');questions.forEach(([k,t,opts])=>{const d=document.createElement('div');d.innerHTML=`<label>${t}</label>`+(opts.length?`<select name="${k}" required><option value="">בחרי</option>${opts.map(o=>`<option>${o}</option>`).join('')}</select>`:`<input name="${k}" required>`);f.appendChild(d);});
document.getElementById('submit').onclick=async()=>{const form=new FormData(f);const p={id:crypto.randomUUID(),sessionId,submittedAt:new Date().toISOString()};for(const [k] of questions){const v=form.get(k);if(!v) return alert('נא למלא הכול');p[k]=v;p[`${k}Code`]=maps[k]?.[v]||v;}await setDoc(doc(db,'responses',p.id),p);await updateDoc(doc(db,'sessions',sessionId),{completedCount:increment(1)});localStorage.setItem('displayName',p.displayName);localStorage.setItem('responseId',p.id);location.href=`waiting.html?session=${sessionId}`;}
</script></body></html>
